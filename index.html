const ROWS = 17, COLS = 17;
const ROW_LABELS = ["A","B","C","D","E","F","G","H","I","J","K","L","M","N","O","P","Q"];

function getZone(row) {
  if (row === 16) return "home1"; // P1 bottom
  if (row === 0)  return "home2"; // P2 top
  return "combat";
}
function isRelicSpawn(row, col) { return col === 8 && (row === 0 || row === 16); }
function tileVar(row, col) { return (((row*17+col)*2654435761)>>>0) % 10 - 5; }

// Movement calculation per class
// Tank/Range (3-1): 1-2=1, 3-4=2, 5-6=3
// Others (e.g. 6-1, 8-2, 9-2): roll result capped at max
function calcMove(hero, roll) {
  if (hero.moveType === "3-1") {
    if (roll <= 2) return 1;
    if (roll <= 4) return 2;
    return 3;
  }
  // Variable: roll capped at max
  return Math.min(roll, hero.moveMax);
}

// ─── ATTACK SYSTEM ───────────────────────────────────────────
// Returns { dice, calcDamage(rolls) } per hero class
function getAttackProfile(hero) {
  const id = hero.id.replace(/^p[12]_/,'');
  if (id==="gravon"||id==="antoni") {
    // Tank: 1D6, damage = roll, capped at atkMax
    const max = id==="gravon" ? 4 : 6;
    return { dice:1, calcDamage:(r)=>Math.min(r[0],max), label:`1D6 (max ${max})` };
  }
  if (id==="chance") {
    // Vanguard: 2D6, damage = highest die, doubles = crit (max value), cap 8
    return { dice:2, calcDamage:(r)=>{ const h=Math.max(r[0],r[1]); return r[0]===r[1]?Math.min(r[0]+r[1],8):Math.min(h,8); }, label:"2D6 highest (cap 8)" };
  }
  if (id==="nojo") {
    // Assassin: 2D6, damage = sum, no cap
    return { dice:2, calcDamage:(r)=>r[0]+r[1], label:"2D6 sum" };
  }
  if (id==="jovel") {
    // Archer: 2D6, damage = sum, no cap
    return { dice:2, calcDamage:(r)=>r[0]+r[1], label:"2D6 sum" };
  }
  if (id==="madb") {
    // Mage: 1D6 splash
    return { dice:1, calcDamage:(r)=>r[0], label:"1D6 splash", splash:true };
  }
  // Healers don't attack
  return { dice:1, calcDamage:(r)=>0, label:"No attack" };
}

// Manhattan distance between two board keys
function tileDistance(keyA, keyB) {
  const [r1,c1]=keyA.split("-").map(Number);
  const [r2,c2]=keyB.split("-").map(Number);
  return Math.abs(r1-r2)+Math.abs(c1-c2);
}

// Check if attacker can reach target given board state
// Melee (tanks, vanguard): adjacent only (distance 1)
// Range (archer, mage): line of sight — blocked by enemy heroes/tanks
function canAttack(attackerKey, targetKey, attackerHero, board) {
  const baseId = attackerHero.id.replace(/^p[12]_/,'');
  const dist = tileDistance(attackerKey, targetKey);
  const isRange = ["jovel","madb"].includes(baseId);
  const isMelee = !isRange && !["iza","austi"].includes(baseId);

  // No attacking from or into home zones
  const [ar,ac] = attackerKey.split("-").map(Number);
  const [tr,tc] = targetKey.split("-").map(Number);
  if (getZone(ar) !== "combat") return false; // attacker must be in combat zone
  if (getZone(tr) !== "combat") return false; // target must be in combat zone

  if (isMelee) {
    if (dist === 1) return true;
    // PASSIVE: Breakline (Antoni) — attack up to 2 spaces directly forward
    if (baseId === "antoni") {
      const attackerOwner = attackerHero.id.startsWith("p1_") ? 1 : 2;
      const fwd = attackerOwner === 1 ? -1 : 1; // P1 moves toward row 0, P2 toward row 16
      if (tr === ar + fwd && tc === ac) return true; // 1 forward
      if (tr === ar + fwd*2 && tc === ac) return true; // 2 forward
    }
    return false;
  }

  if (isRange) {
    // Must be within 7 spaces
    if (dist > 7) return false;
    // Must be in same row or column (orthogonal line of sight)
    if (ar!==tr && ac!==tc) return false; // not in line
    // Check for blocking pieces between attacker and target
    const dr = Math.sign(tr-ar), dc = Math.sign(tc-ac);
    let r=ar+dr, c=ac+dc;
    while (`${r}-${c}` !== targetKey) {
      const cell = board[`${r}-${c}`];
      if (cell && cell.type==="hero") return false;
      r+=dr; c+=dc;
    }
    return true;
  }
  return false;
}

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function getTileStyle(row,col,hovered,validSpawn,validMove,isTankRight,validTarget,isAttacker,isTrapPlacement,hasTrap){
  const zone=getZone(row),relic=isRelicSpawn(row,col),v=tileVar(row,col);
  if(isTankRight)  return{bg:"#0a0806",border:"#181408",glow:"none"};
  if(hovered&&isTrapPlacement) return{bg:"#2e1a00",border:"#ff8c00",glow:"0 0 14px rgba(255,140,0,0.7)"};
  if(hovered&&validTarget) return{bg:"#2e0e0e",border:"#ff4a4a",glow:"0 0 14px rgba(255,74,74,0.7)"};
  if(hovered&&validSpawn) return{bg:"#0e2e1e",border:"#3acc94",glow:"0 0 14px rgba(58,204,148,0.7)"};
  if(hovered&&validMove)  return{bg:"#1e1e2e",border:"#6a8aff",glow:"0 0 14px rgba(106,138,255,0.7)"};
  if(hovered)      return{bg:"#2a2214",border:"#c8a840",glow:"0 0 8px rgba(200,168,64,0.4)"};
  if(isAttacker)   return{bg:"#2a1a0a",border:"#ff8a3a",glow:"0 0 10px rgba(255,138,58,0.5)"};
  if(isTrapPlacement) return{bg:"#1a0e00",border:"#aa5a00",glow:"inset 0 0 8px rgba(170,90,0,0.4)"};
  if(hasTrap)      return{bg:"#1a0a00",border:"#aa4400",glow:"inset 0 0 6px rgba(170,68,0,0.3)"};
  if(validTarget)  return{bg:"#200a0a",border:"#aa2a2a",glow:"inset 0 0 8px rgba(170,42,42,0.5)"};
  if(validSpawn)   return{bg:"#0a201a",border:"#228860",glow:"inset 0 0 8px rgba(34,136,96,0.5)"};
  if(validMove)    return{bg:"#0e0e20",border:"#3a4a8a",glow:"inset 0 0 6px rgba(58,74,138,0.5)"};
  if(relic){
    if(zone==="home1")return{bg:"#141e10",border:"#3a7030",glow:"inset 0 0 10px rgba(58,112,48,0.5)"};
    return{bg:"#1e1208",border:"#6a3a10",glow:"inset 0 0 10px rgba(106,58,16,0.5)"};
  }
  if(zone==="home1"){const b=20+v;return{bg:`rgb(${b+2},${b+8},${b+24})`,border:"#14203e",glow:"none"};}
  if(zone==="home2"){const b=20+v;return{bg:`rgb(${b+20},${b+6},${b+2})`,border:"#3c1610",glow:"none"};}
  const ck=(row+col)%2===0,base=ck?28+v:22+v;
  return{bg:`rgb(${base+2},${base},${base-2})`,border:`rgba(${base+10},${base+8},${base+6},0.45)`,glow:"none"};
}

function DiscardPile({pile}){
  const top=pile[pile.length-1],prev=pile[pile.length-2];
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"4px"}}>
      <div style={{position:"relative",width:"52px",height:"72px"}}>
        {prev&&<div style={{position:"absolute",top:"-2px",left:"2px",width:"52px",height:"72px",
          borderRadius:"5px",overflow:"hidden",border:"1px solid #221c08",transform:"rotate(2.5deg)",opacity:0.6}}>
          <img src={ACTION_IMGS[prev.key]} style={{width:"100%",display:"block"}} alt=""/>
        </div>}
        {top
          ?<div style={{position:"absolute",top:0,left:0,width:"52px",height:"72px",borderRadius:"5px",overflow:"hidden",
              border:"1px solid #3a3020",boxShadow:"0 2px 8px rgba(0,0,0,0.6)"}}>
            <img src={ACTION_IMGS[top.key]} style={{width:"100%",display:"block"}} alt={top.name}/>
          </div>
          :<div style={{position:"absolute",inset:0,border:"1px dashed #221c08",borderRadius:"5px",
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:"0.42rem",color:"#1e1808",textTransform:"uppercase"}}>Empty</div>
        }
      </div>
      <div style={{fontSize:"0.46rem",color:"#4a3a18",textTransform:"uppercase",textAlign:"center",lineHeight:"1.5"}}>
        Discard<br/><span style={{color:"#2e2408"}}>{pile.length}</span>
      </div>
    </div>
  );
}

function HeroInfoPanel({hero, currentHp, onClose, spawnAction}) {
  const baseId = hero.id.replace(/^p[12]_/,'');
  const abilities = HERO_ABILITIES[baseId] || [];
  const hpPct = (currentHp/hero.maxHp)*100;
  const hpColor = hpPct>60?"#4acc4a":hpPct>30?"#ccaa2a":"#cc2a2a";
  const abilityTypeColor = t => t==="Passive"?"#5a8a5a":t==="Activate"?"#5a6a9a":"#9a7a2a";

  return(
    <div style={{
      position:"fixed",top:0,left:0,right:0,bottom:0,
      background:"rgba(0,0,0,0.8)",zIndex:100,
      display:"flex",alignItems:"center",justifyContent:"center",
      padding:"20px",
    }} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{
        width:"300px",maxWidth:"90vw",
        background:"linear-gradient(160deg,#14120e,#0e0c08)",
        border:`1px solid ${hero.accent}44`,
        borderRadius:"8px",overflow:"hidden",
        boxShadow:`0 0 40px ${hero.color}44, 0 20px 60px rgba(0,0,0,0.9)`,
      }}>
        {/* Header */}
        <div style={{
          padding:"14px 16px 12px",
          background:`linear-gradient(135deg,${hero.color}33,transparent)`,
          borderBottom:`1px solid ${hero.accent}33`,
          position:"relative",
        }}>
          <button onClick={onClose} style={{
            position:"absolute",top:"10px",right:"10px",
            background:"#1a1810",border:"1px solid #2a2418",borderRadius:"50%",
            width:"24px",height:"24px",color:"#7a6a40",cursor:"pointer",
            fontSize:"0.7rem",display:"flex",alignItems:"center",justifyContent:"center",
          }}>✕</button>
          <div style={{fontSize:"1.1rem",color:"#e8d080",fontFamily:"'Palatino Linotype',Georgia,serif",
            fontWeight:"bold",letterSpacing:"0.06em",marginBottom:"2px"}}>{hero.name}</div>
          <div style={{fontSize:"0.52rem",color:hero.accent,textTransform:"uppercase",
            letterSpacing:"0.14em"}}>{hero.title} · {hero.cls}</div>
        </div>

        {/* HP + Stats */}
        <div style={{padding:"12px 16px",borderBottom:`1px solid #1e1810`}}>
          <div style={{marginBottom:"10px"}}>
            <div style={{display:"flex",justifyContent:"space-between",
              fontSize:"0.5rem",color:"#6a5a38",marginBottom:"4px",letterSpacing:"0.06em"}}>
              <span>HP</span>
              <span style={{color:hpColor,fontFamily:"Georgia"}}>{currentHp} / {hero.maxHp}</span>
            </div>
            <div style={{height:"6px",background:"#1a1610",borderRadius:"3px",overflow:"hidden"}}>
              <div style={{height:"100%",width:`${hpPct}%`,background:hpColor,
                transition:"width 0.3s",borderRadius:"3px"}}/>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
            {[{label:"Movement",val:hero.move},{label:"Attack",val:hero.atk}]
              .map(({label,val},i)=>(
              <div key={i} style={{background:"#0e0c08",border:"1px solid #2a2010",
                borderRadius:"4px",padding:"6px 8px",textAlign:"center"}}>
                <div style={{fontSize:"0.42rem",color:"#4a3a20",textTransform:"uppercase",
                  letterSpacing:"0.1em",marginBottom:"3px"}}>{label}</div>
                <div style={{fontSize:"0.72rem",color:"#c8a840",fontFamily:"Georgia"}}>{val}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Abilities */}
        <div style={{padding:"12px 16px",display:"flex",flexDirection:"column",gap:"10px"}}>
          {abilities.map((ab,i)=>(
            <div key={i} style={{
              borderBottom:i<abilities.length-1?`1px solid #1a1608`:"none",
              paddingBottom:i<abilities.length-1?"10px":"0",
            }}>
              <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"3px",flexWrap:"wrap"}}>
                <span style={{fontSize:"0.6rem",color:"#d4b84a",fontWeight:"bold",
                  letterSpacing:"0.04em",fontFamily:"Georgia"}}>{ab.name}</span>
                <span style={{fontSize:"0.4rem",color:abilityTypeColor(ab.type),
                  textTransform:"uppercase",letterSpacing:"0.1em",
                  background:abilityTypeColor(ab.type)+"22",borderRadius:"2px",
                  padding:"1px 4px"}}>
                  {ab.type}{ab.type==="Special"?" · Once per Life":""}
                </span>
              </div>
              <div style={{fontSize:"0.5rem",color:"#7a6a48",lineHeight:"1.6"}}>{ab.desc}</div>
            </div>
          ))}
        </div>
        {spawnAction&&(
          <div style={{padding:"0 16px 16px"}}>
            <button onClick={spawnAction} style={{
              width:"100%",padding:"12px",

              color:"#7acc7a",fontSize:"0.7rem",letterSpacing:"0.1em",
              textTransform:"uppercase",cursor:"pointer",fontFamily:"Georgia,serif",

    </div>
  );

// ─── MAIN ────────────────────────────────────────────────────
function RulesPage({onBack}){
  const Section=({title,children})=>(
    <div style={{marginBottom:"28px"}}>
      <div style={{fontSize:"0.7rem",color:"#c8a840",fontFamily:"'Palatino Linotype',Georgia,serif",
        letterSpacing:"0.12em",textTransform:"uppercase",borderBottom:"1px solid #2a2010",
        paddingBottom:"6px",marginBottom:"12px"}}>{title}</div>
      <div style={{fontSize:"0.52rem",color:"#8a7a50",lineHeight:"1.9"}}>{children}</div>
    </div>
  );
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0a0806,#12100a)",
      color:"#c8a840",fontFamily:"Georgia,serif",overflowY:"auto"}}>
      {/* Header */}
      <div style={{position:"sticky",top:0,background:"#0a0806",borderBottom:"1px solid #2a2010",
        padding:"14px 20px",display:"flex",alignItems:"center",gap:"12px",zIndex:10}}>
        <button onClick={onBack} style={{background:"#14120a",border:"1px solid #2a2010",
          borderRadius:"4px",padding:"6px 12px",color:"#8a7a50",cursor:"pointer",
          fontSize:"0.52rem",letterSpacing:"0.08em"}}>Back</button>
        <div style={{fontSize:"0.8rem",color:"#c8a840",letterSpacing:"0.16em",textTransform:"uppercase"}}>
          Rules
        </div>
      </div>
      <div style={{maxWidth:"520px",margin:"0 auto",padding:"24px 20px 60px"}}>
        <div style={{textAlign:"center",marginBottom:"28px"}}>
          <div style={{fontSize:"1.8rem",color:"#e8d080",fontFamily:"'Palatino Linotype',Georgia,serif",
            fontWeight:"bold",letterSpacing:"0.06em"}}>RELICBOUND</div>
          <div style={{fontSize:"0.5rem",color:"#5a4a28",letterSpacing:"0.2em",marginTop:"4px"}}>
            TACTICAL BOARD GAME — RULEBOOK
          </div>
        </div>

        <Section title="Objective">
          Capture the enemy relic and return it to your home zone to score points. First player to score 3 relics wins the round. Win 3 rounds to win the match.
        </Section>

        <Section title="Turn Structure">
          Each turn consists of one Main Action and any number of Free Actions.
          <br/><br/>
          <strong style={{color:"#c8a840"}}>Main Action</strong> — choose one:
          <br/>• Spawn a Hero (roll 2D6 for spawn budget)
          <br/>• Move a Hero (declare hero, then roll for movement)
          <br/>• Draw Cards (draw 2 cards from your deck)
          <br/><br/>
          <strong style={{color:"#c8a840"}}>Free Actions</strong> — any/all each turn:
          <br/>• Attack (once per turn)
          <br/>• Heal (once per turn — cannot do both attack and heal)
          <br/>• Play cards from hand
        </Section>

        <Section title="Spawning Heroes">
          Roll 2D6 to generate a spawn budget. Spend it to place heroes from your bench onto your home row. Hero costs: Tanks and Healers cost 3, Range heroes cost 5, Vanguards cost 7. You may spawn multiple heroes if your budget allows. Rolling under 3 loses your turn.
        </Section>

        <Section title="Movement">
          Declare which hero you are moving, then roll. Move that hero orthogonally (no diagonal) one step at a time. Heroes cannot pass through other heroes. Relic carriers move at double cost (each step uses 2 movement).
          <br/><br/>
          <strong style={{color:"#c8a840"}}>Movement by class:</strong>
          <br/>• Vanguards: variable, up to 6 or 9 spaces
          <br/>• Tanks: 1-3 spaces (roll D6, halved)
          <br/>• Healers: variable, up to 6 spaces
          <br/>• Range: 1-3 spaces
        </Section>

        <Section title="Tanks">
          Tanks occupy 2 tiles wide visually but move as a single unit. Enemy non-tanks cannot walk through your tanks. When a tank moves into an adjacent enemy non-tank hero, that hero is pushed back 1 tile.
        </Section>

        <Section title="Combat">
          Once per turn, any hero may attack an adjacent enemy (or range heroes may attack from range). Roll attack dice — result is damage dealt. No damage is dealt in home zones.
          <br/><br/>
          <strong style={{color:"#c8a840"}}>Attack profiles:</strong>
          <br/>• Vanguards: 2D6 sum or highest
          <br/>• Tanks: 1D6 capped
          <br/>• Range/Mage: 2D6 sum or splash
          <br/>• Healers: cannot attack
          <br/><br/>
          Defeated heroes return to the bench and may be respawned.
        </Section>

        <Section title="Healing">
          Iza and Austi (Healers) can heal an adjacent allied hero once per turn. Roll 1D6 — restore that much HP (capped at max). Cannot heal and attack in the same turn.
        </Section>

        <Section title="The Relic">
          Each player has a relic that spawns in their home zone. A non-tank hero can pick up the enemy relic by stepping on it. Carrying the relic costs double movement. Return the relic to your own home zone to score a point. If a relic carrier is defeated in the combat zone, the relic drops on that tile. If defeated in the home zone, the relic resets to spawn.
        </Section>

        <Section title="Cards">
          Draw 2 cards as your main action. Cards may be played as free actions on your turn. Some cards are reactions and can be played on the opponent's turn.
          <br/><br/>
          <strong style={{color:"#c8a840"}}>Card types:</strong>
          <br/>• Power — combat and movement boosts
          <br/>• Tactic — strategic effects
          <br/>• Trap — placed on the board, triggered by enemies
          <br/>• Trump — powerful effects (Momentum Shift)
        </Section>

        <Section title="Traps">
          Trap cards are placed on your half of the board (center row to 2 rows from your home). You have 4 trap slots — slot 1 covers 1 tile, slot 2 covers 2 tiles, etc. When an enemy hero steps on a covered tile, the trap triggers and is removed. Tap a placed trap on the board to see its effect.
        </Section>

        <Section title="Reaction Cards">
          Brace and Last Stand can be played when an enemy attacks your hero. When an attack is rolled, a reaction prompt appears — play your card or take the hit. Overwatch allows your Archer or Mage to fire during the opponent's turn.
        </Section>

        <Section title="Winning">
          Score 3 relics to win the round. Win 3 rounds to win the match. Best of 5 rounds total.
        </Section>

      </div>
    </div>

function useWindowWidth() {
  const [width, setWidth] = useState(typeof window !== "undefined" ? window.innerWidth : 800);
  useEffect(() => {
    const handle = () => setWidth(window.innerWidth);
    window.addEventListener("resize", handle);
    return () => window.removeEventListener("resize", handle);
  }, []);
  return width;
}

      const dr=hero.id.startsWith("p1_")?1:-1;
      let nr=r,nc=c;
      for(let i=0;i<2;i++){if(!board[`${nr+dr}-${nc}`]){nr+=dr;}}
      setBoard(prev=>{const nb={...prev};delete nb[atKey];nb[`${nr}-${nc}`]={type:"hero",hero};return nb;});
      addLog(`${hero.name} pushed back 2 tiles!`);
    } else if(hit.type==="false_step"){
      const startKey=moveStartKey;
      if(startKey&&startKey!==atKey){
        setBoard(prev=>{const nb={...prev};delete nb[atKey];nb[startKey]={type:"hero",hero};return nb;});
        addLog(`${hero.name} returned to start!`);
      }
      setMovesLeft(0);setPhase("post-action");
    }
  };

  const trapCheckOnMove=(toKey,hero)=>{
    const enemyTraps=turn===1?p2Traps:p1Traps;
    const setEnemyTraps=turn===1?setP2Traps:setP1Traps;
    const hit=enemyTraps.find(t=>t.tiles.includes(toKey)&&ENTER_TRAPS.includes(t.type));
    if(!hit)return;
    setEnemyTraps(prev=>prev.filter(t=>t.id!==hit.id));
    applyTrapHit(hit,hero,toKey);
  };

  const trapCheckEndMove=(finalKey,hero)=>{
    const enemyTraps=turn===1?p2Traps:p1Traps;
    const setEnemyTraps=turn===1?setP2Traps:setP1Traps;
    const hit=enemyTraps.find(t=>t.tiles.includes(finalKey)&&!ENTER_TRAPS.includes(t.type));
    if(!hit)return;
    setEnemyTraps(prev=>prev.filter(t=>t.id!==hit.id));
    applyTrapHit(hit,hero,finalKey);
  };

  const getValidMoveTiles=(fromKey)=>{
    if(!fromKey)return[];
    const[fr,fc]=fromKey.split("-").map(Number);
    const movingHero=board[fromKey]?.hero;
    const isMovingTank=movingHero?.tank;
    const enemyPrefix=turn===1?"p2_":"p1_";
    const dirs=[[-1,0],[1,0],[0,-1],[0,1]];

    const tilePassable=(r,c,allowPush=false)=>{
      if(r<0||r>=ROWS||c<0||c>=COLS)return false;
      const cell=board[`${r}-${c}`];
      if(!cell||cell.type==="relic"){
        if(cell?.type==="relic"&&cell.owner===turn){
          const zone=getZone(r);
          if(zone==="home1"||zone==="home2")return false;
        }
        return true;
      }
      if(cell.type==="hero"){
        if(allowPush&&isMovingTank&&cell.hero?.id?.startsWith(enemyPrefix)&&!cell.hero?.tank)return true;
        return false;
      }
      return false;
    };

    return dirs.map(([dr,dc])=>{
      const nr=fr+dr,nc=fc+dc;
      const nk=`${nr}-${nc}`;
      if(!isMovingTank){
        if(!tilePassable(nr,nc))return null;
        return nk;
      }
      if(dc===-1){if(!tilePassable(nr,nc))return null;return nk;}
      if(dc===1){if(!tilePassable(nr,nc+1,true))return null;return nk;}
      if(!tilePassable(nr,nc))return null;
      if(!tilePassable(nr,nc+1))return null;
      return nk;
    }).filter(Boolean);
  };

  const activeHeroKey=phase==="move-execute"?moveHeroKey:phase==="bonus-move"?bonusHeroKey:null;
  const validMoveTiles=activeHeroKey?getValidMoveTiles(activeHeroKey):[];
  const activeHero=activeHeroKey?board[activeHeroKey]?.hero:null;
  const displayMoveTiles=activeHero?.tank
    ?validMoveTiles.map(k=>{
        const[,ac]=activeHeroKey.split("-").map(Number);
        const[,kc]=k.split("-").map(Number);
        return kc>ac?`${k.split("-")[0]}-${kc+1}`:k;
      })
    :validMoveTiles;
  const displayToActual=(displayKey)=>{
    if(!activeHero?.tank)return displayKey;
    const[,ac]=activeHeroKey.split("-").map(Number);
    const[dr2,dc2]=displayKey.split("-").map(Number);
    return dc2>ac?`${dr2}-${dc2-1}`:displayKey;
  };

  const selectHeroToMove=(key)=>{
    const hero=board[key]?.hero;
    if(!hero)return;
    setMoveHeroKey(key);
    setMoveStartKey(key);
    const bid=baseId(hero);
    const hasFullCharge=hexedHeroes[hero.id+"_fullcharge"];
    // Full Charge: Antoni uses normal movement (skip dice, set spaces from moveMax)
    if(bid==="antoni"&&hasFullCharge){
      setHexedHeroes(prev=>{const n={...prev};delete n[hero.id+"_fullcharge"];return n;});
      const spaces=hero.moveMax||3;
      setMoveDice([null,null]);setMoveRoll(spaces);setMovesLeft(spaces);
      setPhase("move-execute");
      addLog(`Full Charge! Antoni moves ${spaces} spaces freely.`);
      return;
    }
    setDiceRollKey(k=>k+1);
    setMoveRolling(true);setMoveSettling(false);setMoveDice([null,null]);
    let c=0;
    const iv=setInterval(()=>{
      const r1=Math.ceil(Math.random()*6);
      const r2=hero.moveDice>1?Math.ceil(Math.random()*6):null;
      setMoveDice([r1,r2]);
      if(++c>=8){
        clearInterval(iv);
        const fd1=Math.ceil(Math.random()*6);
        const fd2=hero.moveDice>1?Math.ceil(Math.random()*6):null;
        setMoveRolling(false);setMoveSettling(true);setMoveDice([null,null]);
        setTimeout(()=>{
          setMoveDice([fd1,fd2]);setMoveSettling(false);
          const rolls=[fd1,fd2].filter(Boolean);
          let spaces=calcMove(hero,hero.moveDice>1?rolls.reduce((a,b)=>a+b,0):fd1);
          // PASSIVE: Objective Runner (Nojo) +1 move while carrying relic
          if(bid==="nojo"&&relicCarrier?.heroId===hero.id){
            spaces+=1;
            addLog(`Objective Runner! Nojo +1 movement while carrying relic.`);
          }
          // ACTIVATE: Shatter Step (Antoni) +1 forward movement
          if(bid==="antoni"&&hexedHeroes[hero.id+"_shatter"]){
            spaces+=1;
            setHexedHeroes(prev=>{const n={...prev};delete n[hero.id+"_shatter"];return n;});
            addLog(`Shatter Step! Antoni gains +1 movement.`);
          }
          setMoveRoll(spaces);setMovesLeft(spaces);
          setPhase("move-execute");
          addLog(`${hero.name} rolls ${fd1}${fd2?"+"+fd2:""} — ${spaces} space${spaces!==1?"s":""}.`);
        },380);
      }
    },85);
  };

  const moveHeroStep=(toKey)=>{
    if(!validMoveTiles.includes(toKey))return;
    const fromKey=phase==="bonus-move"?bonusHeroKey:moveHeroKey;
    const cell=board[fromKey];
    if(!cell)return;
    const hero=cell.hero;
    const isTank=hero?.tank;
    const nb={...board};
    const enemyPrefix=turn===1?"p2_":"p1_";
    const[tr,tc]=toKey.split("-").map(Number);

    // Tank push
    if(isTank){
      const[fr,fc]=fromKey.split("-").map(Number);
      const dc=Math.sign(tc-fc);
      const pushCheckKey=dc===1?`${tr}-${tc+1}`:toKey;
      if(nb[pushCheckKey]?.type==="hero"&&nb[pushCheckKey]?.hero?.id?.startsWith(enemyPrefix)){
        const pushedHero=nb[pushCheckKey].hero;
        const dr=Math.sign(tr-fr);
        const pushKey=dc===1?`${tr}-${tc+2}`:`${tr+dr}-${tc+dc}`;
        const[pk_r,pk_c]=pushKey.split("-").map(Number);
        const pushInBounds=pk_r>=0&&pk_r<ROWS&&pk_c>=0&&pk_c<COLS;
        if(pushInBounds&&!nb[pushKey]){
          nb[pushKey]={...nb[pushCheckKey]};
          if(relicCarrier?.heroId===pushedHero.id)setRelicCarrier(rc=>rc?{...rc,boardKey:pushKey}:rc);
          addLog(`${hero.name} pushes ${pushedHero.name}!`);
        } else {
          addLog(`${hero.name} pushes ${pushedHero.name} — nowhere to go!`);
        }
        delete nb[pushCheckKey];
      }
      if(dc!==1&&nb[toKey]?.type==="hero"&&nb[toKey]?.hero?.id?.startsWith(enemyPrefix)){
        const pushedHero=nb[toKey].hero;
        const dr=Math.sign(tr-fr);
        const pushKey=`${tr+dr}-${tc+dc}`;
        const[pk_r,pk_c]=pushKey.split("-").map(Number);
        if(pk_r>=0&&pk_r<ROWS&&pk_c>=0&&pk_c<COLS&&!nb[pushKey]){
          nb[pushKey]={...nb[toKey]};
          if(relicCarrier?.heroId===pushedHero.id)setRelicCarrier(rc=>rc?{...rc,boardKey:pushKey}:rc);
          addLog(`${hero.name} pushes ${pushedHero.name}!`);
        }
        delete nb[toKey];
      }
    }

    // Move hero
    nb[toKey]={...cell};
    delete nb[fromKey];

    // Relic interaction
    let newRelicCarrier=relicCarrier;
    const originalTile=board[toKey];
    if(!isTank&&originalTile?.type==="relic"&&!relicCarrier){
      const relicOwner=originalTile.owner;
      if(relicOwner!==turn){
        newRelicCarrier={heroId:hero.id,owner:relicOwner,boardKey:toKey};
        setRelicCarrier(newRelicCarrier);
        addLog(`${hero.name} picked up the relic!`);
        delete nb[toKey];nb[toKey]={...cell};
      } else {
        const relicZone=getZone(tr);
        if(relicZone==="combat"){
          const baseKey=turn===1?"16-8":"0-8";
          const[br,bc]=baseKey.split("-").map(Number);
          let homeRelicKey=baseKey;
          if(nb[baseKey]){for(let dc2=-4;dc2<=4;dc2++){const k=`${br}-${bc+dc2}`;const[,kc]=k.split("-").map(Number);if(kc>=0&&kc<COLS&&!nb[k]){homeRelicKey=k;break;}}}
          nb[homeRelicKey]={type:"relic",owner:turn};
          delete nb[toKey];nb[toKey]={...cell};
          addLog(`${hero.name} returned own relic home!`);
        } else {
          nb[toKey]={type:"relic",owner:relicOwner};
          nb[fromKey]={...cell};
          addLog(`Can't move onto own relic.`);
          setBoard(nb);return;
        }
      }
    }

    // Relic carrier return
    const toZone=getZone(tr);
    const isMyHome=(turn===1&&toZone==="home1")||(turn===2&&toZone==="home2");
    if(newRelicCarrier?.heroId===hero.id&&isMyHome){
      const newScore=turn===1?p1Score+1:p2Score+1;
      if(turn===1)setP1Score(newScore);else setP2Score(newScore);
      setRelicCarrier(null);
      const baseKey=turn===1?"0-8":"16-8";
      const relicOwner=turn===1?2:1;
      const findFree=(base)=>{if(!nb[base])return base;const[br,bc]=base.split("-").map(Number);for(let dc2=-4;dc2<=4;dc2++){const k=`${br}-${bc+dc2}`;const[,kc]=k.split("-").map(Number);if(kc>=0&&kc<COLS&&!nb[k])return k;}return base;};
      nb[findFree(baseKey)]={type:"relic",owner:relicOwner};
      addLog(`${hero.name} scored! P${turn}: ${newScore}/${RELICS_TO_WIN}`);
      if(newScore>=RELICS_TO_WIN){setRoundWinner(turn);}
    }

    if(relicCarrier?.heroId===hero.id&&!isMyHome)setRelicCarrier({...relicCarrier,boardKey:toKey});
    setBoard(nb);
    trapCheckOnMove(toKey,hero);
    trapCheckEndMove(toKey,hero);

    const isNowCarrying=newRelicCarrier?.heroId===hero.id||relicCarrier?.heroId===hero.id;
    const stepCost=isNowCarrying?2:1;
    const rem=(phase==="bonus-move"?bonusMoveLeft:movesLeft)-stepCost;
    const loc=`${ROW_LABELS[tr]}${tc+1}`;
    addLog(`${hero.name} → ${loc}. ${Math.max(0,rem)} move${rem!==1?"s":""} left.`);
    if(phase==="bonus-move"){
      setBonusMoveLeft(rem);setBonusHeroKey(toKey);
      if(rem<=0){trapCheckEndMove(toKey,hero);setPhase("post-action");}
    } else {
      setMovesLeft(rem);setMoveHeroKey(toKey);
      if(rem<=0){
        trapCheckEndMove(toKey,hero);
        if(cardPhase==="tactical-advance-move"){
          const remaining=cardHeroes.filter(k=>k!==moveHeroKey);
          if(remaining.length>0){setCardHeroes(remaining);setMoveHeroKey(remaining[0]);setMovesLeft(1);addLog(`Next hero — move 1 space.`);}
          else{cancelCard();setPhase("post-action");addLog("Tactical Advance complete.");}
        } else if(cardPhase==="momentum-shift-move"){
          const remaining=(cardTarget||[]).filter(k=>k!==moveHeroKey);
          if(remaining.length>0){setCardTarget(remaining);setMoveHeroKey(remaining[0]);setMovesLeft(2);addLog(`Next hero — move up to 2 spaces.`);}
          else{cancelCard();setPhase("post-action");addLog("Momentum Shift complete.");}
        } else {setPhase("post-action");}
      }
    }
  };

  // ── DEFEAT HERO ────────────────────────────────────────────
  const defeatHero=(key,hero)=>{
    const[r,c]=key.split("-").map(Number);
    setBoard(prev=>{
      const nb={...prev};
      delete nb[key];
      if(relicCarrier?.heroId===hero.id){
        const zone=getZone(r);
        if(zone==="home1"||zone==="home2"){
          const baseKey=relicCarrier.owner===2?"0-8":"16-8";
          const[br,bc]=baseKey.split("-").map(Number);
          let spawnKey=baseKey;
          if(nb[baseKey]){for(let dc2=-4;dc2<=4;dc2++){const k=`${br}-${bc+dc2}`;const[,kc]=k.split("-").map(Number);if(kc>=0&&kc<COLS&&!nb[k]){spawnKey=k;break;}}}
          nb[spawnKey]={type:"relic",owner:relicCarrier.owner};
        } else {
          nb[key]={type:"relic",owner:relicCarrier.owner};
        }
      }
      return nb;
    });
    if(relicCarrier?.heroId===hero.id)setRelicCarrier(null);
    const setBench=hero.id.startsWith("p1_")?setP1Bench:setP2Bench;
    const baseHero=HEROES.find(h=>hero.id.endsWith(h.id));
    if(baseHero)setBench(prev=>[...prev,{...baseHero,id:hero.id}]);
    addLog(`${hero.name} defeated and returned to bench.`);
  };

  // ── COMBAT ─────────────────────────────────────────────────

  const validTargets=attackPhase==="select-target"&&attackerKey
    ?Object.keys(board).filter(k=>{
        const cell=board[k];
        if(!cell||cell.type!=="hero")return false;
        const enemyPrefix=turn===1?"p2_":"p1_";
        if(!cell.hero?.id?.startsWith(enemyPrefix))return false;
        return canAttack(attackerKey,k,board[attackerKey]?.hero,board);
      })
    :[];

  const validHealTiles=healPhase==="select-target"&&healerKey
    ?Object.keys(board).filter(k=>{
        const cell=board[k];
        if(!cell||cell.type!=="hero")return false;
        if(!cell.hero?.id?.startsWith(playerPrefix))return false;
        if(cell.hero.id===board[healerKey]?.hero?.id)return false;
        const[hr,hc]=healerKey.split("-").map(Number);
        const[tr2,tc2]=k.split("-").map(Number);
        return Math.abs(hr-tr2)+Math.abs(hc-tc2)===1;
      })
    :[];

  const selectAttacker=(key)=>{
    setAttackerKey(key);setAttackPhase("select-target");
    addLog(`${board[key]?.hero?.name} ready to attack. Select target.`);
  };

  const selectTarget=(key)=>{
    rollAttack(attackerKey,key,board[attackerKey]?.hero);
  };

  const defenderHasReaction=(cardKey)=>{
    const defHand=turn===1?p2Hand:p1Hand;
    return defHand.some(c=>c.key===cardKey);
  };

  const defenderDiscardCard=(cardKey)=>{
    if(turn===1){
      const card=p2Hand.find(c=>c.key===cardKey);
      setP2Hand(h=>{const i=h.findIndex(c=>c.key===cardKey);return i>=0?[...h.slice(0,i),...h.slice(i+1)]:h;});
      if(card)setP2Discard(d=>[...d,card]);
    } else {
      const card=p1Hand.find(c=>c.key===cardKey);
      setP1Hand(h=>{const i=h.findIndex(c=>c.key===cardKey);return i>=0?[...h.slice(0,i),...h.slice(i+1)]:h;});
      if(card)setP1Discard(d=>[...d,card]);
    }
  };

  const resolveAttackWithBrace=()=>{
    if(!pendingAttack)return;
    const{tKey,dmg,aKey,isCrit,isSplash}=pendingAttack;
    const reduced=Math.max(0,dmg-2);
    defenderDiscardCard("brace");
    addLog(`Brace! Damage reduced from ${dmg} to ${reduced}.`);
    applyDamage(tKey,reduced,aKey,isCrit,isSplash,pendingAttack.attackerId);
    setPendingAttack(null);
  };

  const resolveAttackWithLastStand=()=>{
    if(!pendingAttack)return;
    const{tKey,dmg,aKey,isCrit,isSplash}=pendingAttack;
    defenderDiscardCard("last_stand");
    setLastStandActive(true);
    addLog(`Last Stand activated!`);
    applyDamage(tKey,dmg,aKey,isCrit,isSplash);
    setPendingAttack(null);
    setLastStandActive(false);
  };

  const resolveAttackNoReaction=()=>{
    if(!pendingAttack)return;
    const{tKey,dmg,aKey,isCrit,isSplash}=pendingAttack;
    applyDamage(tKey,dmg,aKey,isCrit,isSplash,pendingAttack.attackerId);
    setPendingAttack(null);
  };

  const rollAttack=(aKey,tKey,hero)=>{
    setAttackPhase("rolling");
    setDiceRollKey(k=>k+1);
    setAttackRolling(true);setAttackSettling(false);setAttackDice([null,null]);
    setSpawnDice([null,null]);setMoveDice([null,null]);
    setAttackedOnTurn(turnNum);setAttackedByPlayer(turn);
    const profile=getAttackProfile(hero);
    const bid=baseId(hero);
    const isRange=["jovel","madb"].includes(bid);
    let c=0;
    const iv=setInterval(()=>{
      const r1=Math.ceil(Math.random()*6);
      const r2=profile.dice>1?Math.ceil(Math.random()*6):null;
      setAttackDice([r1,r2]);
      if(++c>=10){
        clearInterval(iv);
        const fd1=Math.ceil(Math.random()*6);
        const fd2=profile.dice>1?Math.ceil(Math.random()*6):null;
        const rolls=[fd1,fd2].filter(Boolean);
        // Special: Rally the Front — auto 8 dmg crit, no roll needed
        if(cardPhase==="rally-front"){
          clearInterval(iv);
          setAttackRolling(false);setAttackSettling(false);
          setAttackDice([6,6]);
          setAttackPhase("result");
          setAttackResult({damage:8,crit:true,splash:false,rolls:[6,6]});
          const targetName=board[tKey]?.hero?.name||"target";
          addLog(`Rally the Front! Auto-critical — 8 damage to ${targetName}!`);
          setCardPhase("idle");setPlayingCard(null);
          const hasBrace=defenderHasReaction("brace");
          const hasLS=defenderHasReaction("last_stand");
          if(hasBrace||hasLS){setPendingAttack({tKey,dmg:8,aKey,isCrit:true,isSplash:false,attackerId:hero.id});addLog(`Defender: play a reaction card?`);}
          else{applyDamage(tKey,8,aKey,true,false,hero.id);}
          return;
        }
        const psBonus=cardPhase==="power-strike-ready"?2:0;
        // PASSIVE: Strength in Numbers (Chance) +1 if adjacent ally
        const strengthBonus=(bid==="chance"&&hasAdjacentAlly(aKey))?1:0;
        let dmg=profile.calcDamage(rolls)+psBonus+strengthBonus;
        const isCrit=profile.dice>1&&fd1===fd2;
        if(strengthBonus>0){addLog(`Strength in Numbers! +1 damage.`);}
        if(psBonus>0){setCardPhase("idle");setPlayingCard(null);}
        setAttackRolling(false);setAttackSettling(true);setAttackDice([null,null]);
        setTimeout(()=>{
          setAttackDice([fd1,fd2]);setAttackSettling(false);
          setAttackPhase("result");
          if(isCrit)
          setAttackResult({damage:dmg,crit:isCrit,splash:!!profile.splash,rolls});
          const isRange2=["jovel","madb"].includes(bid);
          if(isRange2)else
          const targetName=board[tKey]?.hero?.name||"target";
          addLog(`${hero.name} attacks ${targetName} for ${dmg} damage${isCrit?" — CRIT!":""}.`);
          const hasBrace=defenderHasReaction("brace");
          const hasLS=defenderHasReaction("last_stand");
          if(hasBrace||hasLS){
            setPendingAttack({tKey,dmg,aKey,isCrit,isSplash:!!profile.splash,attackerId:hero.id});
            addLog(`Defender: play a reaction card?`);
          } else {
            applyDamage(tKey,dmg,aKey,isCrit,!!profile.splash,hero.id);
          }
          // PASSIVE: Press the Line (Chance) / Crippling Shot (Jovel) — move after attack
          if(bid==="chance"&&cardPhase!=="rally-front"){setPressLineReady(true);}
          if(bid==="jovel"&&cardPhase!=="deadeye-lock"){setCripplingReady(true);}
          // SPECIAL: Twin Strike — queue second attack after first resolves
          if(cardPhase==="twin-strike"){
            setTimeout(()=>{
              setAttackPhase("select-target");
              setCardPhase("twin-strike-2");
              addLog(`Twin Strike — select second target (or same hero).`);
            },600);
          }
          // SPECIAL: Deadeye Lock — after attack, target gets 0 movement for 2 turns
          if(cardPhase==="deadeye-lock"){
            const targetHero=board[tKey]?.hero;
            if(targetHero){
              setHexedHeroes(prev=>({...prev,
                [targetHero.id+"_snare"]:2, // reuse snare with count
                [targetHero.id+"_snare2"]:true,
              }));
              addLog(`Deadeye Lock! ${targetHero.name} cannot move for 2 turns.`);
            }
            setCardPhase("idle");
          }
        },380);
      }
    },85);
  };

  const applyDamage=(tKey,dmg,aKey,isCrit,isSplash,attackerId)=>{
    const attackerBid=attackerId?.replace(/^p[12]_/,'')||'';
    const defenderHero=board[tKey]?.hero;
    const defenderBid=defenderHero?baseId(defenderHero):'';

    // PASSIVE: Elusive (Nojo) — -2 damage when attacked
    let finalDmg=dmg;
    if(defenderBid==="nojo"){
      finalDmg=Math.max(0,dmg-2);
      if(finalDmg<dmg)addLog(`Elusive! Nojo reduces damage by 2 (${dmg}→${finalDmg}).`);
    }
    // SPECIAL: Bulwark Stand (Gravon) — -4 damage while active
    if(defenderHero&&hexedHeroes[defenderHero.id+"_bulwark"]){
      const reduced=Math.max(0,finalDmg-4);
      addLog(`Bulwark Stand! Gravon reduces damage by 4 (${finalDmg}→${reduced}).`);
      finalDmg=reduced;
    }
    // ACTIVATE: Focused Signal (Austi) — reduce damage to ally by 1
    const allyPrefix2=`p${turn===1?2:1}_`;
    if(defenderHero?.id?.startsWith(allyPrefix2)){
      const austiKey=Object.keys(board).find(k=>board[k]?.hero&&baseId(board[k].hero)==="austi"&&hexedHeroes[board[k].hero.id+"_austi_focus"]);
      if(austiKey){
        const austiHero=board[austiKey].hero;
        finalDmg=Math.max(0,finalDmg-1);
        setHexedHeroes(prev=>{const n={...prev};delete n[austiHero.id+"_austi_focus"];return n;});
        addLog(`Focused Signal! Austi reduces damage by 1.`);
      }
    }

    // PASSIVE: Tunnel Focus (Jovel) — gain/lose HP based on damage dealt
    if(attackerBid==="jovel"){
      if(finalDmg<=3){
        // Jovel takes 1 damage for weak hits
        const jKey=aKey;
        const jHero=board[jKey]?.hero;
        if(jHero){
          setHpMap(prev=>({...prev,[jHero.id]:Math.max(0,(prev[jHero.id]??jHero.maxHp)-1)}));

        aiSay(`AI rolls ${tot} (${d1}+${d2}).`);addLog(`AI rolls ${tot} (${d1}+${d2}).`);
        if(tot < 3){ endTurn(); return; }
        let budget=tot, newBoard={...brd}, newBench=[...bench];
        // Prefer attackers then healers
        const order = ['chance','nojo','jovel','madb','iza','austi','gravon','antoni'];
        let placed = false;
        for(const bid of order){
          const h = newBench.find(h=>h.id.endsWith(bid));
          if(h && (h.spawnCost||3) <= budget){
            let col=8, att=0;
            while(newBoard[`0-${col}`]&&att<COLS){col=(col+1)%COLS;att++;}
            if(!newBoard[`0-${col}`]){
              newBoard[`0-${col}`]={type:"hero",hero:h};
              budget-=(h.spawnCost||3);
              newBench=newBench.filter(x=>x.id!==h.id);
              aiSay(`AI spawns ${h.name}.`);addLog(`AI spawns ${h.name}.`);
              placed=true;
            }
          }
        }
        setBoard(newBoard); setP2Bench(newBench);
        aiDelay(()=>endTurn(), 600);
      }, 700);
      return;
    }

    // Priority 2: Attack any reachable enemy
    const attacked = aiTryAttack(brd, null, true);
    if(attacked) return;

    // Priority 3: Move — carrier heads home, others pursue relic or chase enemies
    if(aiKeys.length > 0){
      const carrier = relicCarrier?.owner===1 && aiKeys.find(k=>brd[k]?.hero?.id===relicCarrier?.heroId);

      aiDelay(()=>{
        // Choose hero and target
        let heroKey=null, targetKey=null;
        if(carrier){
          heroKey=carrier; targetKey=`0-8`;
          aiSay(`${brd[heroKey]?.hero?.name} carries relic home!`);addLog(`AI carrier heads home.`);
        } else if(aiKeys.length>0){
          const target=p1Relic||(p1Keys.length?p1Keys[0]:null);
          heroKey=aiKeys[0]; targetKey=target;
          if(target) { aiSay(`${brd[heroKey]?.hero?.name} advances...`);addLog(`AI hero advances.`); }
        }
        if(!heroKey||!targetKey){ aiDelay(()=>aiTryAttack(brd,()=>{aiEnd();endTurn();}),300); return; }
        // Step-by-step movement
        const moveSteps=(cur, stepsLeft, curBoard)=>{
          if(stepsLeft<=0||!targetKey){ aiDelay(()=>aiTryAttack(curBoard,()=>{aiEnd();endTurn();}),600); return; }
          const step=aiBestStep(cur,targetKey);
          if(!step||curBoard[step]){ aiDelay(()=>aiTryAttack(curBoard,()=>{aiEnd();endTurn();}),600); return; }
          const nb={...curBoard}; nb[step]=nb[cur]; delete nb[cur];
          setBoard({...nb});
          aiDelay(()=>moveSteps(step,stepsLeft-1,nb),700);
        };
        const hero=brd[heroKey]?.hero;
        const maxSteps=hero?.moveMax||3;
        moveSteps(heroKey, maxSteps, brd);
      }, 600);
      return;
    }

    // Fallback
    aiDelay(()=>endTurn(), 500);
  };

  // ── HARD AI ──────────────────────────────────────────────
  const aiHard = (brd, bench, deck, hand, hpM) => {
    const aiKeys = Object.entries(brd).filter(([,v])=>v.type==="hero"&&v.hero?.id?.startsWith("p2_")).map(([k])=>k);
    const p1Keys = Object.entries(brd).filter(([,v])=>v.type==="hero"&&v.hero?.id?.startsWith("p1_")).map(([k])=>k);
    const p1Relic = getRelicKey(1);

    // Priority 1: Play a card if beneficial
    if(hand.length > 0){
      const useful = hand.find(c=>['forced_march','emergency_deploy','rally_point','momentum_shift','adrenaline_rush'].includes(c.key));
      if(useful && Math.random() > 0.4){
        aiSay(`AI plays ${useful.name}.`);addLog(`AI plays ${useful.name}.`);
        // Simplified: just discard the card and get its effect
        const newHand = hand.filter(c=>c!==useful);
        setP2Hand(newHand);
        setP2Discard(d=>[...d,useful]);
        if(useful.key==='rally_point'){
          const newHpM={...hpM};
          aiKeys.forEach(k=>{const h=brd[k]?.hero;if(h)newHpM[h.id]=Math.min(h.maxHp,(newHpM[h.id]??h.maxHp)+2);});
          setHpMap(newHpM);
          aiSay(`AI: Rally Point restores 2 HP to all heroes.`);addLog(`AI: Rally Point restores 2 HP to all heroes.`);
        }
        aiDelay(()=>aiMedium(brd,bench,deck,newHand,hpM), 500);
        return;
      }
    }

    // Priority 2: Spawn with optimal hero selection
    if(bench.length>0 && aiKeys.length<4){
      aiDelay(()=>{
        const d1=Math.ceil(Math.random()*6),d2=Math.ceil(Math.random()*6);
        const tot=d1+d2;
        aiSay(`AI rolls ${tot}.`);addLog(`AI rolls ${tot}.`);
        if(tot<3){endTurn();return;}
        let budget=tot,newBoard={...brd},newBench=[...bench];
        // Hard: spawn most cost-effective hero for situation
        const needsHealer=aiKeys.filter(k=>brd[k]?.hero&&(hpM[brd[k].hero.id]??brd[k].hero.maxHp)<brd[k].hero.maxHp*0.5).length>0;
        const order=needsHealer?['iza','austi','nojo','chance','jovel','madb','gravon','antoni']:['nojo','chance','jovel','madb','iza','austi','gravon','antoni'];
        for(const bid of order){
          const h=newBench.find(h=>h.id.endsWith(bid));
          if(h&&(h.spawnCost||3)<=budget){
            let col=8,att=0;
            while(newBoard[`0-${col}`]&&att<COLS){col=(col+1)%COLS;att++;}
            if(!newBoard[`0-${col}`]){
              newBoard[`0-${col}`]={type:"hero",hero:h};
              budget-=(h.spawnCost||3);
              newBench=newBench.filter(x=>x.id!==h.id);
              aiSay(`AI spawns ${h.name}.`);addLog(`AI spawns ${h.name}.`);
            }
          }
        }
        setBoard(newBoard);setP2Bench(newBench);
        aiDelay(()=>endTurn(),600);
      },700);
      return;
    }

    // Priority 3: Attack weakest enemy
    const attacked = aiTryAttack(brd, null, true, true);
    if(attacked) return;

    // Priority 4: Move optimally
    aiDelay(()=>{
      const carrier2=relicCarrier?.owner===1&&aiKeys.find(k=>brd[k]?.hero?.id===relicCarrier?.heroId);
      let heroKey=null, targetKey=null;
      if(carrier2){
        heroKey=carrier2; targetKey='0-8';
        aiSay(`${brd[heroKey]?.hero?.name} runs relic home!`);addLog(`AI carrier beelines home.`);
      } else if(p1Relic&&aiKeys.length>0){
        const closest=aiKeys.reduce((a,b)=>aiDist(a,p1Relic)<aiDist(b,p1Relic)?a:b);
        heroKey=closest; targetKey=p1Relic;
        aiSay(`${brd[heroKey]?.hero?.name} goes for the relic!`);addLog(`AI pursues relic.`);
      } else if(p1Keys.length>0&&aiKeys.length>0){
        const weakest=p1Keys.reduce((a,b)=>(hpM[brd[a]?.hero?.id]??brd[a]?.hero?.maxHp??99)<(hpM[brd[b]?.hero?.id]??brd[b]?.hero?.maxHp??99)?a:b);
        const closest=aiKeys.reduce((a,b)=>aiDist(a,weakest)<aiDist(b,weakest)?a:b);
        heroKey=closest; targetKey=weakest;
        aiSay(`${brd[heroKey]?.hero?.name} hunts ${brd[weakest]?.hero?.name}!`);addLog(`AI hunts enemy.`);
      }
      if(!heroKey||!targetKey){aiDelay(()=>{aiEnd();endTurn();},400);return;}
      const hero2=brd[heroKey]?.hero;
      const maxSteps2=hero2?.moveMax||3;
      const moveSteps2=(cur,stepsLeft,curBoard)=>{
        if(stepsLeft<=0){aiDelay(()=>aiTryAttack(curBoard,()=>{aiEnd();endTurn();}),600);return;}
        const step=aiBestStep(cur,targetKey);
        if(!step||curBoard[step]){aiDelay(()=>aiTryAttack(curBoard,()=>{aiEnd();endTurn();}),600);return;}
        const nb={...curBoard};nb[step]=nb[cur];delete nb[cur];
        setBoard({...nb});
        aiDelay(()=>moveSteps2(step,stepsLeft-1,nb),700);
      };
      moveSteps2(heroKey,maxSteps2,brd);
    },700);
  };

  // ── AI ATTACK HELPER ─────────────────────────────────────
  // Returns true if an attack was initiated
  const aiTryAttack = (brd, onNoAttack, returnResult=false, preferWeak=false) => {
    const aiKeys2=Object.entries(brd).filter(([,v])=>v.type==="hero"&&v.hero?.id?.startsWith("p2_")).map(([k])=>k);
    const p1Keys2=Object.entries(brd).filter(([,v])=>v.type==="hero"&&v.hero?.id?.startsWith("p1_")).map(([k])=>k);

    // Find valid attack pairs
    const pairs=[];
    for(const aKey of aiKeys2){
      const aHero=brd[aKey]?.hero;
      if(!aHero) continue;
      for(const tKey of p1Keys2){
        if(canAttack(aKey,tKey,aHero,brd)) pairs.push({aKey,tKey,aHero});
      }
    }

    if(!pairs.length){ if(onNoAttack) aiDelay(onNoAttack,300); return false; }

    // Pick attack — prefer weakest target on hard
    let chosen=pairs[Math.floor(Math.random()*pairs.length)];
    if(preferWeak){
      chosen=pairs.reduce((best,p)=>{
        const bHp=hpMap[brd[p.tKey]?.hero?.id]??brd[p.tKey]?.hero?.maxHp??99;
        const bestHp=hpMap[brd[best.tKey]?.hero?.id]??brd[best.tKey]?.hero?.maxHp??99;
        return bHp<bestHp?p:best;
      });
    }

    // Execute attack after delay
    aiDelay(()=>{
      aiSay(`AI: ${chosen.aHero.name} attacks!`);addLog(`AI: ${chosen.aHero.name} attacks!`);
      setAttackedOnTurn(turnNum);setAttackedByPlayer(2);
      // Roll dice
      const profile=getAttackProfile(chosen.aHero);
      const d1=Math.ceil(Math.random()*6);
      const d2=profile.dice>1?Math.ceil(Math.random()*6):null;
      const rolls=[d1,d2].filter(Boolean);
      const dmg=profile.calcDamage(rolls);
      const isCrit=profile.dice>1&&d1===d2;
      setAttackDice([d1,d2]);setDiceRollKey(k=>k+1);
      aiSay(`AI rolls ${d1}${d2?"+"+d2:""} — ${dmg} damage${isCrit?" CRIT!":""}.`);addLog(`AI rolls ${d1}${d2?"+"+d2:""} — ${dmg} damage${isCrit?" CRIT!":""}.`);
      aiDelay(()=>{
        applyDamage(chosen.tKey,dmg,chosen.aKey,isCrit,!!profile.splash,chosen.aHero.id);
        aiDelay(()=>{aiEnd();endTurn();},1200);
      },900);
    },500);

    return true;
  };

  // ── AI TRIGGER ───────────────────────────────────────────
  // eslint-disable-next-line react-hooks/exhaustive-deps
  useEffect(()=>{
    if(!isAI||turn!==2||phase!=="choose"||roundWinner||matchWinner) return;
    const timer=setTimeout(()=>{
      aiStart();
      executeAITurn(board, p2Bench, p2Deck, p2Hand, hpMap);
    }, 1200);
    return ()=>clearTimeout(timer);
  },[turn, phase, isAI, turnNum]);

  // ── RENDER HELPERS ─────────────────────────────────────────
  const playerPrefixForTile=(cell)=>cell?.hero?.id?.startsWith("p1_")?"p1":"p2";

  // ── RENDER ──────────────────────────────────────────────────
  return(
    <>
    <div style={{display:"flex",flexDirection:"column",
      background:"#080604",minHeight:"100vh",
      fontFamily:"Georgia,serif",userSelect:"none",WebkitUserSelect:"none"}}>

      {/* Score + Turn banner - sticky at top */}
      <div style={{position:"sticky",top:0,zIndex:10,background:"#080604",
        borderBottom:"1px solid #1a1408",
        display:"flex",gap:"8px",alignItems:"center",padding:"4px 8px",
        flexWrap:"wrap",justifyContent:"center"}}>
        <div style={{background:"#0a0806",border:"1px solid #2a2010",borderRadius:"4px",
          padding:"3px 10px",display:"flex",gap:"10px",alignItems:"center"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:"0.42rem",color:"#4a6aaa",textTransform:"uppercase",letterSpacing:"0.08em"}}>P1</div>
            <div style={{display:"flex",gap:"3px",justifyContent:"center",marginBottom:"2px"}}>
              {Array.from({length:ROUNDS_TO_WIN}).map((_,i)=>(
                <div key={i} style={{width:"6px",height:"6px",borderRadius:"50%",
                  background:i<p1RoundWins?"#4a6aaa":"#1a1a2a"}}/>
              ))}
            </div>
            <div style={{fontSize:"0.9rem",color:"#6a9aff",fontFamily:"Georgia",lineHeight:"1"}}>
              {p1Score}<span style={{fontSize:"0.45rem",color:"#2a3a5a"}}>/{RELICS_TO_WIN}</span>
            </div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:"0.4rem",color:"#5a4a28",letterSpacing:"0.06em"}}>R{roundNum}</div>
            <div style={{fontSize:"0.5rem",color:"#c8a840"}}>✦</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:"0.42rem",color:"#aa4a4a",textTransform:"uppercase",letterSpacing:"0.08em"}}>P2</div>
            <div style={{display:"flex",gap:"3px",justifyContent:"center",marginBottom:"2px"}}>
              {Array.from({length:ROUNDS_TO_WIN}).map((_,i)=>(
                <div key={i} style={{width:"6px",height:"6px",borderRadius:"50%",
                  background:i<p2RoundWins?"#aa4a4a":"#2a1a1a"}}/>
              ))}
            </div>
            <div style={{fontSize:"0.9rem",color:"#ff7a5a",fontFamily:"Georgia",lineHeight:"1"}}>
              {p2Score}<span style={{fontSize:"0.45rem",color:"#5a2a2a"}}>/{RELICS_TO_WIN}</span>
            </div>
          </div>
        </div>
        <div style={{background:"#0c0a05",border:"1px solid #262010",borderRadius:"4px",
          padding:"4px 14px",display:"flex",gap:"10px",alignItems:"center"}}>
          <div style={{width:"8px",height:"8px",borderRadius:"50%",
            background:turn===1?"#4a8aff":"#ff6040",
            boxShadow:turn===1?"0 0 6px #4a8aff":"0 0 6px #ff6040"}}/>
          <span style={{fontSize:"0.65rem",color:"#c8a840",letterSpacing:"0.12em"}}>
            PLAYER {turn} — TURN {turnNum}
          </span>
        </div>
      </div>



      {/* ── RESPONSIVE LAYOUT ── */}
      {isDesktop ? (

        /* DESKTOP */
        <div style={{display:"flex",flex:1,minHeight:0,height:"calc(100vh - 60px)"}}>

          {/* Board */}
          <div style={{flex:"0 0 auto",display:"flex",alignItems:"center",
            justifyContent:"center",padding:"16px",overflowX:"auto",
            borderRight:"1px solid #1a1408",
            background:"linear-gradient(160deg,#0c0a06,#080604)"}}>
            <div style={{perspective:"1100px",perspectiveOrigin:"50% 85%",flexShrink:0}}>
              <div style={{
                transform:boardFlipped?"rotateX(32deg) rotateZ(180deg)":"rotateX(32deg)",
                transformOrigin:"center center",transformStyle:"preserve-3d",
                transition:"transform 0.4s ease"}}>
                <div style={{position:"relative",padding:"18px",
                  background:"linear-gradient(145deg,#0e0b06,#070504,#0e0b06)",

                  <div style={{display:"flex",paddingLeft:"32px",gap:"2px",marginBottom:"3px"}}>
                    {Array.from({length:COLS},(_,c)=>(
                      <div key={c} style={{width:"30px",textAlign:"center",fontSize:"0.48rem",color:"#28200c"}}>{c+1}</div>
                    ))}
                  </div>
                  <div style={{display:"flex",gap:"6px"}}>
                    <div style={{display:"flex",flexDirection:"column",gap:"1px"}}>
                      {ROW_LABELS.map((lbl,r)=>(
                        <div key={r} style={{width:"24px",height:"30px",display:"flex",
                          alignItems:"center",justifyContent:"center",fontSize:"0.48rem",
                          color:getZone(r)==="home1"?"#2a4a2a":getZone(r)==="home2"?"#4a2a18":"#222010"}}>
                          {lbl}
                        </div>
                      ))}
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:`repeat(${COLS},30px)`,
                gap:"1px",background:"#040302",padding:"2px",borderRadius:"2px"}}>
              {Array.from({length:ROWS},(_, r)=>
                Array.from({length:COLS},(_,c)=>{
                  const key=`${r}-${c}`;
                  const cell=board[key];
                  const isH=hoveredTile?.row===r&&hoveredTile?.col===c;
                  const vS=isValidSpawn(r,c);
                  const vM=displayMoveTiles.includes(key);
                  const isTR=false;
                  const isMyHero=cell?.type==="hero"&&cell.hero?.id?.startsWith(playerPrefix);
                  const isSelectable=phase==="move-declare"&&isMyHero;
                  const isAttackerSelectable=attackPhase==="select-attacker"&&isMyHero&&!hasAttacked&&!hasHealed2;
                  const isValidTarget=validTargets.includes(key);
                  const isCurrentAttacker=key===attackerKey;
                  const isHealerSelectable=healPhase==="select-healer"&&isMyHero&&(cell?.hero?.cls?.includes("Healer"))&&!hasHealed2&&!hasAttacked;
                  const isValidHealTarget=validHealTiles.includes(key);
                  const isCurrentHealer=key===healerKey;
                  const isTrapPlace=!!placingTrap&&trapValid(r,c);
                  const trapPreviewTiles=placingTrap&&trapAnchor?trapTiles(trapAnchor,placingTrap):[];
                  const isTrapPreview=trapPreviewTiles.includes(key);
                  const allTraps=[...(p1Traps||[]),...(p2Traps||[])];
                  const hasTrap=allTraps.some(t=>t.tiles.includes(key));
                  const{bg,border,glow}=getTileStyle(r,c,isH,vS,vM,isTR,isValidTarget||isValidHealTarget,isCurrentAttacker||isCurrentHealer,isTrapPlace||isTrapPreview,hasTrap);

                  return(
                    <div key={key}
                      onMouseEnter={()=>setHoveredTile({row:r,col:c})}
                      onMouseLeave={()=>setHoveredTile(null)}
                      onClick={()=>{
                        // Cataclysm — 3 damage to all enemies in 3x2 area
                        if(cardPhase==="cataclysm"){
                          const enemyPrefix=turn===1?"p2_":"p1_";
                          const hits=[];
                          for(let dr=0;dr<3;dr++)for(let dc=0;dc<2;dc++){
                            const tk=`${r+dr}-${c+dc}`;
                            const cell=board[tk];
                            if(cell?.type==="hero"&&cell.hero?.id?.startsWith(enemyPrefix))hits.push({key:tk,hero:cell.hero});
                          }
                          setHpMap(prev=>{
                            const next={...prev};
                            hits.forEach(({key:tk,hero:h})=>{
                              const zone=getZone(parseInt(tk));
                              if(zone!=="combat")return;
                              next[h.id]=Math.max(0,(next[h.id]??h.maxHp)-3);
                              if(next[h.id]===0){addLog(`${h.name} defeated!`);defeatHero(tk,h);}
                            });
                            return next;
                          });
          addLog(`Cataclysm! Hit ${hits.length} hero${hits.length!==1?"es":""} for 3 damage each.`);
                          setCardPhase("idle");setPlayingCard(null);
                          return;
                        }
                        if(placingTrap){
                          if(trapValid(r,c)){
                            if(placingTrap.tilesNeeded===1){commitTrap(key);}
                            else if(!trapAnchor){setTrapAnchor(key);addLog(`Anchor set. Rotate or confirm.`);}
                            else{commitTrap(trapAnchor);}
                          }
                          return;
                        }
                        if(vS)placeHero(r,c);
                        else if(vM)moveHeroStep(displayToActual(key));
                        else if(isSelectable)selectHeroToMove(key);
                        else if(isAttackerSelectable)selectAttacker(key);
                        else if(isValidTarget)selectTarget(key);
                        else if(cardPhase==="select-hero"&&isMyHero){
                          const h=cell?.hero;
                          if(h){
                            if(playingCard?.key==="second_wind"){
                              const cur=hpMap[h.id]!==undefined?hpMap[h.id]:h.maxHp;
                              setHpMap(prev=>({...prev,[h.id]:Math.min(h.maxHp,cur+3)}));
                              addLog(`${h.name} restored 3 HP.`);
                              discardCard(playingCard);cancelCard();
                            } else if(playingCard?.key==="adrenaline_rush"){
                              addLog(`${h.name} gains +2 movement.`);
                              discardCard(playingCard);cancelCard();
                              setMoveHeroKey(key);setMovesLeft(2);setMoveStartKey(key);
                              setPhase("move-execute");
                            } else if(playingCard?.key==="forced_march"){
                              addLog(`${h.name} granted +4 movement.`);
                              discardCard(playingCard);cancelCard();
                              setMoveHeroKey(key);setMovesLeft(4);setMoveStartKey(key);
                              setPhase("move-execute");
                            }
                          }
                        }
                        else if(cardPhase==="tactical-advance"&&isMyHero){
                          const h=cell?.hero;
                          if(h&&!cardHeroes.includes(key)&&cardHeroes.length<3){
                            setCardHeroes(prev=>[...prev,key]);
                            addLog(`${h.name} selected (${cardHeroes.length+1}/3).`);
                          }
                        }
                        else if(cardPhase==="momentum-shift"&&isMyHero){
                          const h=cell?.hero;
                          if(h&&!cardHeroes.includes(key)&&cardHeroes.length<4){
                            setCardHeroes(prev=>[...prev,key]);
                            setCardHeroMoves(prev=>({...prev,[key]:2}));
                            addLog(`${h.name} selected (${cardHeroes.length+1}/4).`);
                          }
                        }
                        else if(isHealerSelectable)selectHealer(key);
                        else if(isValidHealTarget)selectHealTarget(key);
                        else if(cell?.type==="hero")setSelectedInfoHero({hero:cell.hero,hp:getHp(cell.hero)});
                        else if(hasTrap){
                          const trap=allTraps.find(t=>t.tiles.includes(key));
                          if(trap)setSelectedInfoTrap(trap);
                        }
                      }}
                      style={{width:"30px",height:"30px",background:bg,
                        border:`1px solid ${border}`,boxShadow:glow,borderRadius:"2px",
                        display:"flex",alignItems:"center",justifyContent:"center",
                        cursor:(vS||vM||isSelectable||isAttackerSelectable||isValidTarget||isHealerSelectable||isValidHealTarget||(cardPhase==="select-hero"&&isMyHero)||((cardPhase==="tactical-advance"||cardPhase==="momentum-shift")&&isMyHero&&!cardHeroes.includes(key))||(!!placingTrap&&trapValid(r,c)))?"pointer":"default",
                        transition:"background 0.1s,border 0.1s",flexShrink:0,
                        position:"relative",overflow:"visible"}}>
                      {/* Relic */}
                      {cell?.type==="relic"&&(
                        <div style={{fontSize:"12px",color:cell.owner===1?"#4a8aff":"#ff5a40",
                          textShadow:`0 0 8px ${cell.owner===1?"#4a8aff":"#ff5a40"}`,lineHeight:"1"}}>✦</div>
                      )}
                      {/* Non-tank hero */}
                      {cell?.type==="hero"&&!cell.hero?.tank&&(
                        <HeroToken hero={cell.hero} wide={false}
                          movable={isAttackerSelectable||isSelectable}
                          selected={key===moveHeroKey||key===bonusHeroKey||key===attackerKey||key===healerKey||cardHeroes.includes(key)}
                          hp={getHp(cell.hero)}
                          isCarrying={relicCarrier?.heroId===cell.hero.id}
                          playerColor={cell.hero.id.startsWith("p1_")?"p1":"p2"}
                          statusEffects={getStatusEffects(cell.hero.id)}/>
                      )}
                      {/* Tank hero */}
                      {cell?.type==="hero"&&cell.hero?.tank&&(
