                      <img src={EMBLEM} style={{width:"22px",height:"22px",opacity:0.35}} alt=""/>
                    </div>
                  ))}
                  <div style={{fontSize:"0.44rem",color:"#3a3010",marginLeft:"6px",letterSpacing:"0.06em",alignSelf:"center"}}>
                    Tap Reveal<br/>to view
                  </div>
                </div>
                :hand.map((c,i)=>(
                  <div key={i} style={{position:"relative",flexShrink:0,cursor:"pointer"}}
                    onClick={()=>playCard(c)}>
                    <ActionCard card={c} inHand={true}/>
                    <button onClick={e=>{e.stopPropagation();setInspectCard(c);}}
                      style={{position:"absolute",top:"2px",right:"2px",
                        background:"rgba(0,0,0,0.75)",border:"1px solid #3a3020",
                        borderRadius:"50%",width:"14px",height:"14px",color:"#c8a840",
                        cursor:"pointer",fontSize:"0.4rem",display:"flex",
                        alignItems:"center",justifyContent:"center",
                        lineHeight:"1",padding:0,zIndex:10}}>i</button>
                  </div>
                ))
              }
              </div>
            </div>

            <LogWidget log={log}/>
          </div>
        </div>

      ) : (

        /* MOBILE */
        <div style={{width:"100%",display:"flex",flexDirection:"column",position:"relative"}}>

          {/* Board */}
          <div style={{overflowX:"auto",display:"flex",justifyContent:"center",
            background:"linear-gradient(160deg,#0c0a06,#080604)"}}>
            <div style={{perspective:"1100px",perspectiveOrigin:"50% 85%",flexShrink:0}}>
              <div style={{
                transform:boardFlipped?"rotateX(38deg) rotateZ(180deg)":"rotateX(38deg)",
                transformOrigin:"center center",transformStyle:"preserve-3d",
                transition:"transform 0.4s ease"}}>
                <div style={{position:"relative",padding:"18px",
                  background:"linear-gradient(145deg,#0e0b06,#070504,#0e0b06)",
                  boxShadow:"0 0 0 1px #181408,0 40px 100px rgba(0,0,0,0.98)"}}>
                  <RuneBorder W={600} H={576}/>
                  <div style={{display:"flex",paddingLeft:"32px",gap:"2px",marginBottom:"3px"}}>
                    {Array.from({length:COLS},(_,c)=>(
                      <div key={c} style={{width:"30px",textAlign:"center",fontSize:"0.48rem",color:"#28200c"}}>{c+1}</div>
                    ))}
                  </div>
                  <div style={{display:"flex",gap:"6px"}}>
                    <div style={{display:"flex",flexDirection:"column",gap:"1px"}}>
                      {ROW_LABELS.map((lbl,r)=>(
                        <div key={r} style={{width:"24px",height:"30px",display:"flex",
                          alignItems:"center",justifyContent:"center",fontSize:"0.48rem",
                          color:getZone(r)==="home1"?"#2a4a2a":getZone(r)==="home2"?"#4a2a18":"#222010"}}>
                          {lbl}
                        </div>
                      ))}
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:`repeat(${COLS},30px)`,
                gap:"1px",background:"#040302",padding:"2px",borderRadius:"2px"}}>
              {Array.from({length:ROWS},(_, r)=>
                Array.from({length:COLS},(_,c)=>{
                  const key=`${r}-${c}`;
                  const cell=board[key];
                  const isH=hoveredTile?.row===r&&hoveredTile?.col===c;
                  const vS=isValidSpawn(r,c);
                  const vM=displayMoveTiles.includes(key);
                  const isTR=false;
                  const isMyHero=cell?.type==="hero"&&cell.hero?.id?.startsWith(playerPrefix);
                  const isSelectable=phase==="move-declare"&&isMyHero;
                  const isAttackerSelectable=attackPhase==="select-attacker"&&isMyHero&&!hasAttacked&&!hasHealed2;
                  const isValidTarget=validTargets.includes(key);
                  const isCurrentAttacker=key===attackerKey;
                  const isHealerSelectable=healPhase==="select-healer"&&isMyHero&&(cell?.hero?.cls?.includes("Healer"))&&!hasHealed2&&!hasAttacked;
                  const isValidHealTarget=validHealTiles.includes(key);
                  const isCurrentHealer=key===healerKey;
                  const isTrapPlace=!!placingTrap&&trapValid(r,c);
                  const trapPreviewTiles=placingTrap&&trapAnchor?trapTiles(trapAnchor,placingTrap):[];
                  const isTrapPreview=trapPreviewTiles.includes(key);
                  const allTraps=[...(p1Traps||[]),...(p2Traps||[])];
                  const hasTrap=allTraps.some(t=>t.tiles.includes(key));
                  const{bg,border,glow}=getTileStyle(r,c,isH,vS,vM,isTR,isValidTarget||isValidHealTarget,isCurrentAttacker||isCurrentHealer,isTrapPlace||isTrapPreview,hasTrap);

                  return(
                    <div key={key}
                      onMouseEnter={()=>setHoveredTile({row:r,col:c})}
                      onMouseLeave={()=>setHoveredTile(null)}
                      onClick={()=>{
                        // Cataclysm — 3 damage to all enemies in 3x2 area
                        if(cardPhase==="cataclysm"){
                          const enemyPrefix=turn===1?"p2_":"p1_";
                          const hits=[];
                          for(let dr=0;dr<3;dr++)for(let dc=0;dc<2;dc++){
                            const tk=`${r+dr}-${c+dc}`;
                            const cell=board[tk];
                            if(cell?.type==="hero"&&cell.hero?.id?.startsWith(enemyPrefix))hits.push({key:tk,hero:cell.hero});
                          }
                          setHpMap(prev=>{
                            const next={...prev};
                            hits.forEach(({key:tk,hero:h})=>{
                              const zone=getZone(parseInt(tk));
                              if(zone!=="combat")return;
                              next[h.id]=Math.max(0,(next[h.id]??h.maxHp)-3);
                              if(next[h.id]===0){addLog(`${h.name} defeated!`);defeatHero(tk,h);}
                            });
                            return next;
                          });
                          addLog(`Cataclysm! Hit ${hits.length} hero${hits.length!==1?"es":""} for 3 damage each.`);
                          setCardPhase("idle");setPlayingCard(null);
                          return;
                        }
                        if(placingTrap){
                          if(trapValid(r,c)){
                            if(placingTrap.tilesNeeded===1){commitTrap(key);}
                            else if(!trapAnchor){setTrapAnchor(key);addLog(`Anchor set. Rotate or confirm.`);}
                            else{commitTrap(trapAnchor);}
                          }
                          return;
                        }
                        if(vS)placeHero(r,c);
                        else if(vM)moveHeroStep(displayToActual(key));
                        else if(isSelectable)selectHeroToMove(key);
                        else if(isAttackerSelectable)selectAttacker(key);
                        else if(isValidTarget)selectTarget(key);
                        else if(cardPhase==="select-hero"&&isMyHero){
                          const h=cell?.hero;
                          if(h){
                            if(playingCard?.key==="second_wind"){
                              const cur=hpMap[h.id]!==undefined?hpMap[h.id]:h.maxHp;
                              setHpMap(prev=>({...prev,[h.id]:Math.min(h.maxHp,cur+3)}));
                              addLog(`${h.name} restored 3 HP.`);
                              discardCard(playingCard);cancelCard();
                            } else if(playingCard?.key==="adrenaline_rush"){
                              addLog(`${h.name} gains +2 movement.`);
                              discardCard(playingCard);cancelCard();
                              setMoveHeroKey(key);setMovesLeft(2);setMoveStartKey(key);
                              setPhase("move-execute");
                            } else if(playingCard?.key==="forced_march"){
                              addLog(`${h.name} granted +4 movement.`);
                              discardCard(playingCard);cancelCard();
                              setMoveHeroKey(key);setMovesLeft(4);setMoveStartKey(key);
                              setPhase("move-execute");
                            }
                          }
                        }
                        else if(cardPhase==="tactical-advance"&&isMyHero){
                          const h=cell?.hero;
                          if(h&&!cardHeroes.includes(key)&&cardHeroes.length<3){
                            setCardHeroes(prev=>[...prev,key]);
                            addLog(`${h.name} selected (${cardHeroes.length+1}/3).`);
                          }
                        }
                        else if(cardPhase==="momentum-shift"&&isMyHero){
                          const h=cell?.hero;
                          if(h&&!cardHeroes.includes(key)&&cardHeroes.length<4){
                            setCardHeroes(prev=>[...prev,key]);
                            setCardHeroMoves(prev=>({...prev,[key]:2}));
                            addLog(`${h.name} selected (${cardHeroes.length+1}/4).`);
                          }
                        }
                        else if(isHealerSelectable)selectHealer(key);
                        else if(isValidHealTarget)selectHealTarget(key);
                        else if(cell?.type==="hero")setSelectedInfoHero({hero:cell.hero,hp:getHp(cell.hero)});
                        else if(hasTrap){
                          const trap=allTraps.find(t=>t.tiles.includes(key));
                          if(trap)setSelectedInfoTrap(trap);
                        }
                      }}
                      style={{width:"30px",height:"30px",background:bg,
                        border:`1px solid ${border}`,boxShadow:glow,borderRadius:"2px",
                        display:"flex",alignItems:"center",justifyContent:"center",
                        cursor:(vS||vM||isSelectable||isAttackerSelectable||isValidTarget||isHealerSelectable||isValidHealTarget||(cardPhase==="select-hero"&&isMyHero)||((cardPhase==="tactical-advance"||cardPhase==="momentum-shift")&&isMyHero&&!cardHeroes.includes(key))||(!!placingTrap&&trapValid(r,c)))?"pointer":"default",
                        transition:"background 0.1s,border 0.1s",flexShrink:0,
                        position:"relative",overflow:"visible"}}>
                      {/* Relic */}
                      {cell?.type==="relic"&&(
                        <div style={{fontSize:"12px",color:cell.owner===1?"#4a8aff":"#ff5a40",
                          textShadow:`0 0 8px ${cell.owner===1?"#4a8aff":"#ff5a40"}`,lineHeight:"1"}}>✦</div>
                      )}
                      {/* Non-tank hero */}
                      {cell?.type==="hero"&&!cell.hero?.tank&&(
                        <HeroToken hero={cell.hero} wide={false}
                          movable={isAttackerSelectable||isSelectable}
                          selected={key===moveHeroKey||key===bonusHeroKey||key===attackerKey||key===healerKey||cardHeroes.includes(key)}
                          hp={getHp(cell.hero)}
                          isCarrying={relicCarrier?.heroId===cell.hero.id}
                          playerColor={cell.hero.id.startsWith("p1_")?"p1":"p2"}
                          statusEffects={getStatusEffects(cell.hero.id)}/>
                      )}
                      {/* Tank hero */}
                      {cell?.type==="hero"&&cell.hero?.tank&&(
                        <div style={{position:"absolute",left:0,top:"1px",width:"62px",height:"28px",zIndex:3}}>
                          <HeroToken hero={cell.hero} wide={true}
                            movable={isAttackerSelectable||isSelectable}
                            selected={key===moveHeroKey||key===bonusHeroKey||key===attackerKey||cardHeroes.includes(key)}
                            hp={getHp(cell.hero)}
                            isCarrying={relicCarrier?.heroId===cell.hero.id}
                            playerColor={cell.hero.id.startsWith("p1_")?"p1":"p2"}
                            statusEffects={getStatusEffects(cell.hero.id)}/>
                        </div>
                      )}
                      {/* Trap image */}
                      {hasTrap&&!cell&&(()=>{
                        const trap=allTraps.find(t=>t.tiles.includes(key));
                        return trap?(
                          <div style={{position:"absolute",inset:0,display:"flex",
                            alignItems:"center",justifyContent:"center",overflow:"hidden",
                            borderRadius:"2px",opacity:0.55}}>
                            <img src={ACTION_IMGS[trap.type]}
                              style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"top"}}
                              alt={trap.name}/>
                          </div>
                        ):null;
                      })()}
                    </div>
                  );
                })
              )}
              </div>
              </div>{/* end row labels + grid flex */}
            </div>
          </div>
        </div>
      </div>

          <LogWidget log={log}/>

          {/* Bench + Action row */}
          <div style={{display:"flex",width:"100%",alignItems:"flex-start"}}>

            {/* Bench */}
            <div style={{flex:1,padding:"8px 6px",borderRight:"1px solid #1a1408",
              background:"#0a0806",minWidth:0}}>
              <div style={{fontSize:"0.44rem",color:"#5a4a20",letterSpacing:"0.12em",
                textTransform:"uppercase",marginBottom:"6px"}}>
                P{turn} Bench — {(turn===1?p1Bench:p2Bench).length} Ready
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"5px"}}>
                {(turn===1?p1Bench:p2Bench).map(h=>(
                <BenchCard key={h.id} hero={h}
                  selected={selectedHero?.id===h.id}
                  canSelect={phase==="spawn-place"&&(spawnsAvail-spawnsUsed)>=(h.spawnCost||3)}
                  onSelect={()=>{
                    if(phase==="spawn-place"&&(spawnsAvail-spawnsUsed)>=(h.spawnCost||3)){
                      setSelectedHero(h);
                      addLog(`${h.name} selected. Tap home row to place.`);
                    } else { setPendingSpawnHero(h); }
                  }}/>
              ))}
              </div>
            </div>

            {/* Action */}
            <div style={{width:"190px",flexShrink:0,padding:"8px",
              background:"#0c0a06",display:"flex",flexDirection:"column",gap:"6px"}}>
              {/* Dice row - only show the active dice set */}
            <div style={{display:"flex",justifyContent:"center",gap:"12px",minHeight:"52px",alignItems:"center"}}>
              {(attackRolling||attackSettling||attackDice.some(d=>d!==null))?(
                <><Die key={`atk0-${diceRollKey}`} val={attackDice[0]} rolling={attackRolling} settling={attackSettling}/>
                  {attackDice[1]&&<Die key={`atk1-${diceRollKey}`} val={attackDice[1]} rolling={attackRolling} settling={attackSettling}/>}</>
              ):healRolling?(
                <Die key={`heal-${diceRollKey}`} val={healDice[0]} rolling={healRolling} settling={false}/>
              ):(moveRolling||moveSettling||moveDice.some(d=>d!==null))?(
                <><Die key={`mv0-${diceRollKey}`} val={moveDice[0]} rolling={moveRolling} settling={moveSettling}/>
                  {moveDice[1]!==undefined&&<Die key={`mv1-${diceRollKey}`} val={moveDice[1]} rolling={moveRolling} settling={moveSettling}/>}</>
              ):(spawnRolling||spawnSettling||spawnDice.some(d=>d!==null))?(
                <><Die key={`sp0-${diceRollKey}`} val={spawnDice[0]} rolling={spawnRolling} settling={spawnSettling}/>
                  <Die key={`sp1-${diceRollKey}`} val={spawnDice[1]} rolling={spawnRolling} settling={spawnSettling}/></>
              ):null}
            </div>

            {/* Deck + discard */}
            <div style={{display:"flex",gap:"6px",justifyContent:"center",alignItems:"flex-end",
              paddingBottom:"6px",borderBottom:"1px solid #1a1408"}}>
              <div style={{textAlign:"center"}}>
                <DeckPile count={deck.length}/>
                <div style={{fontSize:"0.36rem",color:"#2a2010",letterSpacing:"0.1em",marginTop:"2px"}}>DECK {deck.length}</div>
              </div>
              <div style={{textAlign:"center"}}>
                <DiscardPile pile={discard}/>
                <div style={{fontSize:"0.36rem",color:"#2a2010",letterSpacing:"0.1em",marginTop:"2px"}}>DISCARD {discard.length}</div>
              </div>
            </div>

            {/* Phase label */}
            <div style={{fontSize:"0.42rem",color:"#3a3010",textTransform:"uppercase",
              letterSpacing:"0.12em",textAlign:"center"}}>{
              phase==="choose"?"Your Action":
              phase==="rolling"?"Rolling...":
              phase==="spawn-place"?"Place Hero":
              phase==="spawn-decision"?"Spawn Decision":
              phase==="bonus-move"?"Bonus Move":
              phase==="move-declare"?"Select Hero":
              phase==="move-execute"?`${Math.max(0,movesLeft)} moves left`:
              phase==="post-action"?"Free Actions":
              phase==="confirm-end"?"End Turn?":""
            }</div>

            {/* Reaction UI */}
            {pendingAttack&&(
              <div style={{background:"#1a0e18",border:"1px solid #8a2aaa",borderRadius:"4px",padding:"6px",
                display:"flex",flexDirection:"column",gap:"4px"}}>
                <div style={{fontSize:"0.46rem",color:"#cc6aff",textAlign:"center"}}>
                  Incoming — {pendingAttack.dmg} dmg
                </div>
                {defenderHasReaction("brace")&&(
                  <ActionBtn label="Brace -2" color="#1a2a3a" accent="#3a6aaa" onClick={resolveAttackWithBrace}/>
                )}
                {defenderHasReaction("last_stand")&&(
                  <ActionBtn label="Last Stand" color="#2a1a0a" accent="#aa6a10" onClick={resolveAttackWithLastStand}/>
                )}
                <ActionBtn label="Take hit" color="#2a1408" accent="#5a3010" onClick={resolveAttackNoReaction}/>
              </div>
            )}

            {/* Trap placement */}
            {placingTrap&&(
              <div style={{background:"#1a0e00",border:"1px solid #aa5a00",borderRadius:"4px",padding:"6px",
                display:"flex",flexDirection:"column",gap:"4px"}}>
                <div style={{fontSize:"0.46rem",color:"#ff8c00",textAlign:"center"}}>
                  Placing {placingTrap.card.name}
                </div>
                <div style={{fontSize:"0.38rem",color:"#7a4a10",textAlign:"center"}}>
                  Slot {placingTrap.slot} · {placingTrap.tilesNeeded} tile{placingTrap.tilesNeeded>1?"s":""} · Tap board
                </div>
                {placingTrap.tilesNeeded>1&&(
                  <div style={{display:"flex",gap:"3px",justifyContent:"center"}}>
                    <button onClick={()=>setPlacingTrap(p=>p?{...p,orientation:"h"}:p)}
                      style={{padding:"2px 6px",background:placingTrap.orientation==="h"?"#3a1800":"#1a0e00",
                        border:"1px solid #aa5a00",borderRadius:"3px",color:"#ff8c00",
                        cursor:"pointer",fontSize:"0.38rem"}}>H</button>
                    <button onClick={()=>setPlacingTrap(p=>p?{...p,orientation:"v"}:p)}
                      style={{padding:"2px 6px",background:placingTrap.orientation==="v"?"#3a1800":"#1a0e00",
                        border:"1px solid #aa5a00",borderRadius:"3px",color:"#ff8c00",
                        cursor:"pointer",fontSize:"0.38rem"}}>V</button>
                    {trapAnchor&&(
                      <button onClick={()=>commitTrap(trapAnchor)}
                        style={{padding:"2px 6px",background:"#1a3a1a",border:"1px solid #3a7a3a",
                          borderRadius:"3px",color:"#7acc7a",cursor:"pointer",fontSize:"0.38rem"}}>Place</button>
                    )}
                  </div>
                )}
                <ActionBtn label="Cancel" color="#2a1408" accent="#5a3010" onClick={cancelCard}/>
              </div>
            )}

            {/* Card select-hero UI */}
            {cardPhase==="select-hero"&&playingCard&&(
              <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
                <div style={{fontSize:"0.44rem",color:"#c8a840",textAlign:"center"}}>
                  {playingCard.key==="second_wind"?"Select hero +3HP":
                   playingCard.key==="forced_march"?"Select hero +4 move":
                   playingCard.key==="adrenaline_rush"?"Select hero +2 move":"Select hero"}
                </div>
                <ActionBtn label="Cancel" color="#2a1408" accent="#5a3010" onClick={cancelCard}/>
              </div>
            )}

            {/* Tactical Advance */}
            {cardPhase==="tactical-advance"&&(
              <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
                <div style={{fontSize:"0.44rem",color:"#4a7acc",textAlign:"center"}}>
                  Tactical Advance {cardHeroes.length}/3
                </div>
                {cardHeroes.length>0&&(
                  <ActionBtn label={`Execute (${cardHeroes.length})`} color="#1a2a3a" accent="#3a6aaa" onClick={executeTacticalAdvance}/>
                )}
                <ActionBtn label="Cancel" color="#2a1408" accent="#5a3010" onClick={cancelCard}/>
              </div>
            )}

            {/* Momentum Shift */}
            {cardPhase==="momentum-shift"&&(
              <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
                <div style={{fontSize:"0.44rem",color:"#aa4acc",textAlign:"center"}}>
                  Momentum Shift {cardHeroes.length}/4
                </div>
                {cardHeroes.length>0&&(
                  <ActionBtn label={`Execute (${cardHeroes.length})`} color="#2a1a3a" accent="#7a3aaa" onClick={startMomentumHeroMove}/>
                )}
                <ActionBtn label="Cancel" color="#2a1408" accent="#5a3010" onClick={cancelCard}/>
              </div>
            )}

            {/* Power Strike ready */}
            {cardPhase==="power-strike-ready"&&(
              <div style={{background:"#2a1a08",border:"1px solid #c8a840",borderRadius:"4px",
                padding:"5px",fontSize:"0.44rem",color:"#c8a840",textAlign:"center"}}>
                Power Strike +2
                <div style={{marginTop:"3px"}}>
                  <ActionBtn label="Cancel" color="#2a1408" accent="#5a3010" onClick={cancelCard}/>
                </div>
              </div>
            )}

            {/* Attack result */}
            {attackPhase==="result"&&attackResult&&(
              <div style={{textAlign:"center"}}>
                {attackResult.crit&&<div style={{fontSize:"0.5rem",color:"#ffaa2a"}}>Critical!</div>}
                <div style={{fontSize:"0.9rem",color:"#cc3a3a",fontFamily:"Georgia"}}>
                  {attackResult.damage} dmg
                </div>
              </div>
            )}

            {/* Heal panels */}
            {healPhase==="select-healer"&&(
              <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
                <div style={{fontSize:"0.46rem",color:"#4acc8a",textAlign:"center"}}>Select Healer</div>
                <ActionBtn label="Cancel" color="#2a1408" accent="#5a3010" onClick={()=>setHealPhase("idle")}/>
              </div>
            )}
            {healPhase==="select-target"&&(
              <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
                <div style={{fontSize:"0.46rem",color:"#4acc8a",textAlign:"center"}}>Select target</div>
                <ActionBtn label="Cancel" color="#2a1408" accent="#5a3010" onClick={()=>{setHealPhase("idle");setHealerKey(null);}}/>
              </div>
            )}

            {/* Attack select panels */}
            {attackPhase==="select-attacker"&&(
              <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
                <div style={{fontSize:"0.46rem",color:"#cc5a3a",textAlign:"center"}}>Select attacker</div>
                <ActionBtn label="Cancel" color="#2a1408" accent="#5a3010" onClick={()=>{setAttackPhase("idle");setAttackerKey(null);}}/>
              </div>
            )}
            {attackPhase==="select-target"&&(
              <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
                <div style={{fontSize:"0.46rem",color:"#cc5a3a",textAlign:"center"}}>Select target</div>
                <ActionBtn label="Cancel" color="#2a1408" accent="#5a3010" onClick={()=>{setAttackPhase("idle");setAttackerKey(null);}}/>
              </div>
            )}

            {/* Phase action buttons */}
            {phase==="choose"&&(<>
              <ActionBtn label="Spawn Hero" color="#1a1408" accent="#5a4a20" onClick={rollSpawn}/>
              <ActionBtn label="Move Hero" color="#1a1408" accent="#5a4a20" onClick={()=>{setPhase("move-declare");addLog("Select a hero to move.");}}/>
              <ActionBtn label="Draw Cards" color="#1a1408" accent="#5a4a20" onClick={handleDraw}/>
            </>)}

            {phase==="move-declare"&&(
              <ActionBtn label="← Cancel" color="#2a1408" accent="#5a3010" onClick={()=>{setPhase("choose");addLog("Move cancelled.");}}/>
            )}

            {phase==="spawn-decision"&&(<>
              <div style={{fontSize:"0.44rem",color:"#c8a840",textAlign:"center"}}>
                Budget: {spawnsAvail-spawnsUsed} left
                <span style={{display:"block",fontSize:"0.38rem",color:"#5a4a20",marginTop:"1px"}}>
                  Tanks/Healers 3 · Range 5 · Vanguard 7
                </span>
              </div>
              {(spawnsAvail-spawnsUsed)>=3&&(
                <ActionBtn label="Spawn Another" color="#1a2010" accent="#4a7a30" onClick={continueSpawning}/>
              )}
              <ActionBtn label="Done Spawning" color="#2a1408" accent="#6a3010" onClick={finishSpawnTurn}/>
            </>)}

            {phase==="move-execute"&&(
              <ActionBtn label="Stop Moving" color="#2a1408" accent="#5a3010" onClick={()=>{
                const hero=board[moveHeroKey]?.hero;
                if(hero&&moveHeroKey)trapCheckEndMove(moveHeroKey,hero);
                if(cardPhase==="tactical-advance-move"){
                  const remaining=cardHeroes.filter(k=>k!==moveHeroKey);
                  if(remaining.length>0){setCardHeroes(remaining);setMoveHeroKey(remaining[0]);setMovesLeft(1);}
                  else{cancelCard();setPhase("post-action");}
                } else if(cardPhase==="momentum-shift-move"){
                  const remaining=(cardTarget||[]).filter(k=>k!==moveHeroKey);
                  if(remaining.length>0){setCardTarget(remaining);setMoveHeroKey(remaining[0]);setMovesLeft(2);}
                  else{cancelCard();setPhase("post-action");}
                } else {setPhase("post-action");}
              }}/>
            )}

            {/* Press the Line / Crippling Shot — move 1 after attacking */}
            {(pressLineReady||cripplingReady)&&phase!=="move-execute"&&(
              <div style={{background:"#1a2a0a",border:"1px solid #3a6a1a",borderRadius:"4px",padding:"6px 8px",
                display:"flex",flexDirection:"column",gap:"4px"}}>
                <div style={{fontSize:"0.44rem",color:"#7acc4a",textAlign:"center"}}>
                  {pressLineReady?"Press the Line":"Crippling Shot"} — move 1 space
                </div>
                <ActionBtn label="Move 1 Space" color="#1a3a0a" accent="#4a8a2a"
                  onClick={()=>{
                    const heroKey=attackerKey||myHeroKeys[0];
                    if(heroKey){
                      setMoveHeroKey(heroKey);setMovesLeft(1);setMoveStartKey(heroKey);
                      setPhase("move-execute");
                      setPressLineReady(false);setCripplingReady(false);
    setSpecialPhase('idle');setSpecialHeroKey(null);
    setActivatedHeroes({});setCripplingReady(false);
                      addLog("Move 1 space.");
                    }
                  }}/>
                <ActionBtn label="Skip" color="#2a1408" accent="#5a3010"
                  onClick={()=>{setPressLineReady(false);setCripplingReady(false);}}/>
              </div>
            )}

            {/* Activate ability button */}
            {(phase==="choose"||phase==="post-action")&&myHeroKeys.length>0&&specialPhase==="idle"&&(
              <ActionBtn label="Use Ability" color="#1a1a2a" accent="#4a4a8a"
                onClick={()=>{setSpecialPhase("select-hero");addLog("Select a hero to use their Activate ability.");}}/>
            )}

            {/* Special ability button */}
            {(phase==="choose"||phase==="post-action")&&myHeroKeys.some(k=>!specialUsed[board[k]?.hero?.id])&&(
              <ActionBtn label="Special" color="#2a1a3a" accent="#8a3aaa"
                onClick={()=>{setSpecialPhase("select-special");addLog("Select a hero to use their Special ability.");}}/>
            )}

            {/* Select hero for activate */}
            {specialPhase==="select-hero"&&(
              <div style={{background:"#1a1a2a",border:"1px solid #3a3a7a",borderRadius:"4px",padding:"6px",
                display:"flex",flexDirection:"column",gap:"4px"}}>
                <div style={{fontSize:"0.44rem",color:"#8a8acc",textAlign:"center"}}>Select hero for Activate</div>
                <div style={{display:"flex",flexDirection:"column",gap:"3px"}}>
                  {myHeroKeys.map(k=>{
                    const h=board[k]?.hero;
                    if(!h)return null;
                    const used=!canActivate(h.id);
                    return(
                      <button key={k} disabled={used} onClick={()=>{useActivate(k);setSpecialPhase("idle");}}
                        style={{background:used?"#0e0c0a":"#1a1a2a",border:`1px solid ${used?"#2a2020":"#4a4a7a"}`,
                          borderRadius:"3px",padding:"5px 8px",color:used?"#3a3030":"#c8a840",
                          cursor:used?"default":"pointer",fontSize:"0.44rem",fontFamily:"Georgia,serif",
                          textAlign:"left"}}>
                        {h.name}{used?" (used)":""}
                      </button>
                    );
                  })}
                </div>
                <ActionBtn label="Cancel" color="#2a1408" accent="#5a3010" onClick={()=>setSpecialPhase("idle")}/>
              </div>
            )}

            {/* Select hero for Special */}
            {specialPhase==="select-special"&&(
              <div style={{background:"#2a1a3a",border:"1px solid #6a3a8a",borderRadius:"4px",padding:"6px",
                display:"flex",flexDirection:"column",gap:"4px"}}>
                <div style={{fontSize:"0.44rem",color:"#cc6aff",textAlign:"center"}}>Select hero for Special</div>
                <div style={{display:"flex",flexDirection:"column",gap:"3px"}}>
                  {myHeroKeys.map(k=>{
                    const h=board[k]?.hero;
                    if(!h)return null;
                    const used=specialUsed[h.id];
                    return(
                      <button key={k} disabled={used} onClick={()=>setSpecialHeroKey(k)}
                        style={{background:specialHeroKey===k?"#3a1a4a":used?"#0e0c0a":"#2a1a3a",
                          border:`1px solid ${specialHeroKey===k?"#cc6aff":used?"#2a2020":"#6a3a8a"}`,
                          borderRadius:"3px",padding:"5px 8px",
                          color:used?"#3a3030":specialHeroKey===k?"#ff8aff":"#c8a840",
                          cursor:used?"default":"pointer",fontSize:"0.44rem",fontFamily:"Georgia,serif",
                          textAlign:"left"}}>
                        {h.name}{used?" (used this match)":""}
                      </button>
                    );
                  })}
                </div>
                {specialHeroKey&&(
                  <ActionBtn label={`Confirm — ${board[specialHeroKey]?.hero?.name}'s Special`}
                    color="#3a0a4a" accent="#cc3aff"
                    onClick={()=>executeSpecial(specialHeroKey)}/>
                )}
                <ActionBtn label="Cancel" color="#2a1408" accent="#5a3010"
                  onClick={()=>{setSpecialPhase("idle");setSpecialHeroKey(null);}}/>
              </div>
            )}

            {/* Cataclysm — tap board to place 3x2 area */}
            {cardPhase==="cataclysm"&&(
              <div style={{background:"#0a0a2a",border:"1px solid #2a2a8a",borderRadius:"4px",padding:"6px",
                display:"flex",flexDirection:"column",gap:"4px"}}>
                <div style={{fontSize:"0.44rem",color:"#6a6aff",textAlign:"center"}}>
                  Cataclysm — tap any tile to center the 3×2 blast
                </div>
                <ActionBtn label="Cancel" color="#2a1408" accent="#5a3010" onClick={()=>{setCardPhase("idle");setPlayingCard(null);}}/>
              </div>
            )}

            {/* Lifeline Surge overlay */}
            {cardPhase==="lifeline-surge"&&healPhase==="select-target"&&(
              <div style={{fontSize:"0.44rem",color:"#3a9a80",textAlign:"center",padding:"4px"}}>
                Lifeline Surge — select ally to heal 10 HP
              </div>
            )}

            {(phase==="choose"||phase==="post-action")&&!hasAttacked&&!hasHealed2&&myHeroKeys.length>0&&(
              <ActionBtn label="Attack" color="#2a1008" accent="#8a3010"
                onClick={()=>{setAttackPhase("select-attacker");addLog("Select your attacker.");}}/>
            )}

            {(phase==="choose"||phase==="post-action")&&!hasHealed2&&!hasAttacked&&myHeroKeys.some(k=>board[k]?.hero?.cls?.includes("Healer"))&&(
              <ActionBtn label="Heal" color="#0a1a10" accent="#2a6a3a"
                onClick={()=>{setHealPhase("select-healer");addLog("Select a healer.");}}/>
            )}

            {(phase==="post-action"||phase==="choose")&&(
              <ActionBtn label="End Turn" color="#1a1408" accent="#c8a840" onClick={endTurn}/>
            )}
            {phase==="confirm-end"&&(
              <ActionBtn label="Confirm End Turn" color="#1a1408" accent="#c8a840" onClick={endTurn}/>
            )}

            </div>
          </div>

          {/* Hand */}
          <div style={{borderTop:"1px solid #1a1408",padding:"8px",background:"#080604"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"6px"}}>
              <div style={{fontSize:"0.44rem",color:"#3a2e0c",letterSpacing:"0.12em",textTransform:"uppercase"}}>
                Hand — {hand.length} card{hand.length!==1?"s":""}
              </div>
              {hand.length>0&&(
                <button onClick={()=>setHandRevealed(r=>!r)} style={{
                  background:handRevealed?"#1a2a0a":"#1a1408",
                  border:`1px solid ${handRevealed?"#4a8a2a":"#3a2a10"}`,
                  borderRadius:"4px",padding:"3px 8px",
                  color:handRevealed?"#7acc4a":"#6a5a28",
                  fontSize:"0.42rem",letterSpacing:"0.1em",textTransform:"uppercase",
                  cursor:"pointer",fontFamily:"Georgia,serif"}}>
                  {handRevealed?"Hide":"Reveal"}
                </button>
              )}
            </div>
            <div style={{display:"flex",gap:"6px",alignItems:"flex-end",flexWrap:"wrap",
              justifyContent:"center",minHeight:"80px"}}>
              {hand.length===0
                ?<div style={{fontSize:"0.5rem",color:"#201c08",padding:"10px 16px",
                    border:"1px dashed #181408",borderRadius:"4px",alignSelf:"center"}}>
                    No cards — draw on your turn
                  </div>
                :!handRevealed
                ?<div style={{display:"flex",gap:"4px",alignItems:"center",alignSelf:"center"}}>
                  {hand.map((_,i)=>(
                    <div key={i} style={{width:"44px",height:"62px",borderRadius:"5px",
                      background:"linear-gradient(145deg,#0e0c08,#1a1812,#0e0c08)",
                      border:"1px solid #3a3020",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <img src={EMBLEM} style={{width:"22px",height:"22px",opacity:0.35}} alt=""/>
                    </div>
                  ))}
                  <div style={{fontSize:"0.44rem",color:"#3a3010",marginLeft:"6px",letterSpacing:"0.06em",alignSelf:"center"}}>
                    Tap Reveal<br/>to view
                  </div>
                </div>
                :hand.map((c,i)=>(
                  <div key={i} style={{position:"relative",flexShrink:0,cursor:"pointer"}}
                    onClick={()=>playCard(c)}>
                    <ActionCard card={c} inHand={true}/>
                    <button onClick={e=>{e.stopPropagation();setInspectCard(c);}}
                      style={{position:"absolute",top:"2px",right:"2px",
                        background:"rgba(0,0,0,0.75)",border:"1px solid #3a3020",
                        borderRadius:"50%",width:"14px",height:"14px",color:"#c8a840",
                        cursor:"pointer",fontSize:"0.4rem",display:"flex",
                        alignItems:"center",justifyContent:"center",
                        lineHeight:"1",padding:0,zIndex:10}}>i</button>
                  </div>
                ))
              }
            </div>
          </div>

        </div>
      )}

            {/* Overlays */}

            {/* AI Thinking Overlay */}
            {isAI&&aiActive&&(
              <>
              {/* Dim backdrop */}
              <div style={{position:"fixed",inset:0,zIndex:199,
                background:"rgba(0,0,0,0.45)",pointerEvents:"none"}}/>
              <div style={{position:"fixed",top:"50%",left:"50%",
                transform:"translate(-50%,-50%)",
                zIndex:200,pointerEvents:"none",width:"min(340px,90vw)"}}>
                <div style={{
                  background:"linear-gradient(160deg,#12100a,#0e0c08)",
                  border:"1px solid #4a3a20",borderRadius:"10px",
                  boxShadow:"0 20px 60px rgba(0,0,0,0.95),0 0 0 1px #3a2a10,0 0 40px rgba(200,168,64,0.08)",
                  overflow:"hidden",
                  backdropFilter:"blur(4px)",
                }}>
                  {/* Header */}
                  <div style={{background:"#0a0806",padding:"8px 14px",
                    borderBottom:"1px solid #1a1408",
                    display:"flex",alignItems:"center",gap:"8px"}}>
                    {/* Pulsing dot */}
                    <div style={{width:"8px",height:"8px",borderRadius:"50%",
                      background:"#c8a840",flexShrink:0,
                      animation:"aiPulse 1s ease-in-out infinite",
                      boxShadow:"0 0 6px rgba(200,168,64,0.8)"}}/>
                    <span style={{fontSize:"0.52rem",color:"#c8a840",
                      letterSpacing:"0.14em",textTransform:"uppercase"}}>
                      Computer
                    </span>
                    <span style={{fontSize:"0.48rem",color:"#5a4a20",marginLeft:"auto"}}>
                      {difficulty?.toUpperCase()}
                    </span>
                  </div>
                  {/* Current action */}
                  <div style={{padding:"10px 14px",borderBottom:"1px solid #141008"}}>
                    <div style={{fontSize:"0.58rem",color:"#e8d080",lineHeight:"1.5",
                      minHeight:"1.5em"}}>
                      {aiStatus||"Thinking..."}
                    </div>
                  </div>
                  {/* Action log */}
                  {aiLog.length>1&&(
                    <div style={{padding:"6px 14px 10px",display:"flex",
                      flexDirection:"column",gap:"3px"}}>
                      {aiLog.slice(1).map((msg,i)=>(
                        <div key={i} style={{fontSize:"0.42rem",
                          color:`rgba(90,74,40,${1-i*0.25})`,lineHeight:"1.5"}}>
                          {msg}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
              </>
            )}

            {/* AI pulse animation */}
            {isAI&&(
              <style>{`
                @keyframes aiPulse {
                  0%,100%{opacity:1;transform:scale(1);}
                  50%{opacity:0.4;transform:scale(0.7);}
                }
              `}</style>
            )}
      {inspectCard&&(
        <CardInfoOverlay
          card={inspectCard}
          onClose={()=>setInspectCard(null)}
          onPlay={()=>{playCard(inspectCard);setInspectCard(null);}}
        />
      )}
      {selectedInfoTrap&&(
        <TrapInfoOverlay trap={selectedInfoTrap} onClose={()=>setSelectedInfoTrap(null)}/>
      )}
      {selectedInfoHero&&(
        <HeroInfoPanel
          hero={selectedInfoHero.hero}
          currentHp={getHp(selectedInfoHero.hero)}
          onClose={()=>setSelectedInfoHero(null)}
        />
      )}
      {pendingSpawnHero&&(
        <HeroInfoPanel
          hero={pendingSpawnHero}
          currentHp={pendingSpawnHero.maxHp}
          onClose={()=>setPendingSpawnHero(null)}
          spawnAction={()=>{
            setSelectedHero(pendingSpawnHero);
            setPendingSpawnHero(null);
          }}
        />
      )}

      {/* Round winner */}
      {roundWinner&&!matchWinner&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:150,
          display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{textAlign:"center",padding:"32px",
            background:"linear-gradient(160deg,#14120e,#0a0806)",
            border:`1px solid ${roundWinner===1?"#4a6aaa":"#aa4a4a"}`,
            borderRadius:"10px",minWidth:"260px"}}>
            <div style={{fontSize:"0.55rem",color:"#c8a840",letterSpacing:"0.18em",
              textTransform:"uppercase",marginBottom:"6px"}}>Round {roundNum} Complete</div>
            <div style={{fontSize:"2rem",color:"#e8d080",fontFamily:"'Palatino Linotype',Georgia,serif",
              fontWeight:"bold",marginBottom:"4px"}}>Player {roundWinner}</div>
            <div style={{fontSize:"0.7rem",color:"#c8a840",marginBottom:"20px"}}>Wins the Round!</div>
            <div style={{display:"flex",justifyContent:"center",gap:"24px",marginBottom:"24px"}}>
              {[1,2].map(p=>(
                <div key={p} style={{textAlign:"center"}}>
                  <div style={{fontSize:"0.45rem",color:p===1?"#4a6aaa":"#aa4a4a",
                    textTransform:"uppercase",marginBottom:"4px"}}>P{p}</div>
                  <div style={{display:"flex",gap:"4px",justifyContent:"center"}}>
                    {Array.from({length:ROUNDS_TO_WIN}).map((_,i)=>(
                      <div key={i} style={{width:"12px",height:"12px",borderRadius:"50%",
                        background:i<(p===1?(p1RoundWins+(roundWinner===1?1:0)):(p2RoundWins+(roundWinner===2?1:0)))
                          ?(p===1?"#4a6aaa":"#aa4a4a"):"#2a2010"}}/>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <button onClick={startNextRound} style={{
              background:"linear-gradient(135deg,#1a1a3a,#0e0e20)",
              border:"1px solid #3a3a7a",borderRadius:"5px",
              padding:"12px 32px",color:"#7a7acc",
              fontSize:"0.7rem",letterSpacing:"0.12em",textTransform:"uppercase",
              cursor:"pointer",fontFamily:"Georgia,serif",width:"100%"}}>
              Next Round
            </button>
          </div>
        </div>
      )}

      {/* Match winner */}
      {matchWinner&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.95)",zIndex:200,
          display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{textAlign:"center",padding:"40px 32px",
            background:"linear-gradient(160deg,#14120e,#0a0806)",
            border:"1px solid #c8a840",borderRadius:"10px"}}>
            <div style={{fontSize:"0.6rem",color:"#c8a840",letterSpacing:"0.2em",
              textTransform:"uppercase",marginBottom:"8px"}}>Match Over</div>
            <div style={{fontSize:"2.5rem",color:"#e8d080",fontFamily:"'Palatino Linotype',Georgia,serif",
              fontWeight:"bold",marginBottom:"4px"}}>Player {matchWinner}</div>
            <div style={{fontSize:"0.8rem",color:"#c8a840",marginBottom:"24px"}}>Wins the Match!</div>
            <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
              <button onClick={resetMatch} style={{
                background:"linear-gradient(135deg,#1a3a1a,#0e2010)",
                border:"1px solid #3a7a3a",borderRadius:"5px",
                padding:"14px 40px",color:"#7acc7a",
                fontSize:"0.75rem",letterSpacing:"0.12em",textTransform:"uppercase",
                cursor:"pointer",fontFamily:"Georgia,serif",width:"100%"}}>
                Play Again
              </button>
              <button onClick={()=>{resetMatch();window.location.reload&&window.location.reload();}} style={{
                background:"none",border:"1px solid #2a2010",borderRadius:"5px",
                padding:"10px 40px",color:"#5a4a20",
                fontSize:"0.6rem",letterSpacing:"0.12em",textTransform:"uppercase",
                cursor:"pointer",fontFamily:"Georgia,serif",width:"100%"}}>
                Return to Menu
              </button>
            </div>
          </div>
        </div>
      )}

    </div>
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(RelicboundApp, null));
  </script>
  <script>
    var bar=document.getElementById('lbar'),status=document.getElementById('lstatus');
    function setP(p,m){bar.style.width=p+'%';status.textContent=m;}
    window.addEventListener('load',function(){
      setP(20,'Compiling...');
      setTimeout(function(){
        setP(55,'Building game...');
        setTimeout(function(){
          try{
            var src=document.getElementById('app-src').textContent;
            var out=Babel.transform(src,{
              presets:['react',['env',{targets:{browsers:['last 2 versions']}}]],
              plugins:['proposal-optional-chaining','proposal-nullish-coalescing-operator']
            }).code;
            setP(85,'Starting...');
            setTimeout(function(){
              try{
                new Function('React','ReactDOM',out)(React,ReactDOM);
                document.getElementById('loading').style.display='none';
              }catch(e){
                status.textContent='Runtime: '+e.message;
                bar.style.background='#cc3a3a';
                document.getElementById('loading').innerHTML += '<div style="color:#cc6a6a;font-family:monospace;font-size:11px;max-width:80vw;text-align:center;margin-top:12px;word-break:break-all">'+e.message+'</div>';
                console.error('Runtime error:',e);
              }
            },50);
          }catch(e){
            status.textContent='Compile: '+e.message.slice(0,60);
            bar.style.background='#cc3a3a';
            document.getElementById('loading').innerHTML += '<div style="color:#cc6a6a;font-family:monospace;font-size:11px;max-width:80vw;text-align:center;margin-top:12px;word-break:break-all">'+e.message+'</div>';
            console.error('Compile error:',e);
          }
        },200);
      },100);
    });
  </script>
</body>
</html>
